<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>ACTMASTER 系統載入中</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { background-color: #f8f9fa; font-family: -apple-system, sans-serif; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen">

  <!-- 極簡載入畫面 -->
  <div class="text-center">
    <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
    <h2 id="status-text" class="text-[15px] font-bold text-slate-700 tracking-widest">身分驗證中...</h2>
  </div>

  <script>
    // 確保這裡的 URL 與你的 Cloudflare Worker 100% 一致
    const WORKER_URL = "https://actmaster.fangwl591021.workers.dev"; 
    
    async function initRouter() {
      try {
        // 1. LIFF 初始化與登入
        await liff.init({ liffId: "2008786875-DfKEEqkA" });
        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: window.location.href });
          return;
        }
        
        const profile = await liff.getProfile();
        const userId = profile.userId;
        document.getElementById('status-text').innerText = "連線 SaaS 雲端...";

        // 2. 詢問 Worker 該用戶是否已註冊 (對接 main.gs 的 checkUser)
        const response = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'checkUser',
            payload: { userId: userId }
          })
        });
        
        const result = await response.json();

        // 3. 根據結果進行路由跳轉 (Router)
        // 如果 Worker 回傳成功，而且 isAuthorized 為 true，代表已經註冊並建表完畢
        if (result.success && result.data && result.data.isAuthorized) {
          window.location.replace('card.html');
        } else {
          // 未註冊或找不到資料，跳轉至註冊申請頁面
          window.location.replace('register.html');
        }
        
      } catch (err) {
        console.error(err);
        document.getElementById('status-text').innerText = "系統連線失敗，請稍後再試";
        document.getElementById('status-text').classList.add('text-red-500');
      }
    }

    // 啟動路由
    window.onload = initRouter;
  </script>
</body>
</html>
