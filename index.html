<!-- ... (此處省略部分 UI 結構，重點修復 JavaScript 部分) ... -->
<script>
  // ... (原有 fetchAPI 等邏輯) ...

  window.goPage = function(page, isInitLoad = false) {
    // ... (原有頁面隱藏邏輯) ...

    if (!isInitLoad) {
        if (page === 'admin-activities') window.loadAdminActivities();
        else if (page === 'home') window.loadUserActivities();
        else if (page === 'admin-stats') window.loadAdminStats();
        else if (page === 'my-activities') window.loadMyActivities();
        else if (page === 'admin-settings') {
            if (currentUser) {
                // 🚨 修復：資料回顯至設定頁面
                const elName = document.getElementById('profile-name');
                const elPhone = document.getElementById('profile-phone');
                const elIndustry = document.getElementById('profile-industry');
                const elBirthday = document.getElementById('profile-birthday');

                if (elName) elName.value = currentUser.name || '';
                if (elPhone) elPhone.value = currentUser.phone || '';
                if (elIndustry) elIndustry.value = currentUser.industry || '';
                if (elBirthday) elBirthday.value = currentUser.birthday || ''; // 補回生日
            }
        }
    }
    // ...
  };

  window.updateUserProfile = async function() {
    const name = document.getElementById('profile-name').value.trim();
    const phone = document.getElementById('profile-phone').value.trim();
    const industry = document.getElementById('profile-industry').value.trim();
    const birthday = document.getElementById('profile-birthday').value; // 取得生日

    if(!name || !phone) return window.showToast('⚠️ 姓名與手機為必填', true);

    try {
        const payloadData = { 
            '姓名': name, 
            '手機': phone, 
            '業種': industry, 
            '生日': birthday // 補回發送資料
        };
        
        const res = await window.fetchAPI('updateUserProfile', {
            userId: currentUserProfile.userId,
            data: payloadData
        }, true);

        if(res && !res.error) {
            window.showToast('✅ 基本資料已更新！');
            // 更新本地狀態
            currentUser = { ...currentUser, name, phone, industry, birthday };
            // ... (其餘同步名片邏輯) ...
        }
    } catch(e) {
        window.showToast('⚠️ 更新失敗: ' + e.message, true);
    }
  };

  window.loadUserActivities = async function() {
      const container = document.getElementById('user-activities-list');
      if(!container) return;
      
      container.innerHTML = '<div class="text-center py-10"><span class="material-symbols-outlined animate-spin text-3xl text-slate-200">refresh</span></div>';

      try {
          // 🚨 修復：帶上 networkId 請求，確保能看到所屬商店與全域活動
          const res = await window.fetchAPI('getPublicActivities', { 
              networkId: currentUser?.networkId || 'admin',
              role: currentUser?.role || 'user'
          }, true);

          if (res && res.length > 0) {
              const validActs = res.filter(a => a['狀態'] === '上架').reverse(); 
              if(validActs.length === 0) {
                   container.innerHTML = '<div class="bg-white rounded-2xl p-8 text-center border border-dashed border-slate-200"><p class="text-slate-400 text-sm">近期無公開活動</p></div>';
                   return;
              }
              // ... (渲染 HTML 邏輯保持不變) ...
          } else {
              container.innerHTML = '<div class="bg-white rounded-2xl p-8 text-center border border-dashed border-slate-200"><p class="text-slate-400 text-sm">近期無公開活動</p></div>';
          }
      } catch(e) {
          container.innerHTML = '<div class="text-center py-10 text-red-400 text-sm font-bold">載入失敗</div>';
      }
  };
</script>
