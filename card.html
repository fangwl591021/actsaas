<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>名片收割機</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style type="text/tailwindcss">
    @layer base {
      body { @apply font-['Noto_Sans_TC'] bg-white text-gray-800 antialiased font-normal; -webkit-tap-highlight-color: transparent; }
      * { @apply font-normal !important; border-radius: 0 !important; }
    }
    .btn-line-primary { @apply w-full py-4 bg-blue-600 text-white text-[16px] active:opacity-80 flex items-center justify-center gap-2; }
    .card-row { @apply px-4 py-4 border-b border-gray-50 flex items-center gap-4 active:bg-gray-50; }
  </style>
</head>
<body class="w-full min-h-screen bg-white">

  <!-- 頂部導覽 (原生 OA 風格) -->
  <nav class="sticky top-0 w-full z-40 bg-white px-4 py-3.5 flex justify-between items-center border-b border-gray-100">
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined text-[20px] text-blue-600">contact_mail</span>
      <div class="text-[16px] text-gray-800 tracking-tight">名片收割機</div>
    </div>
    <div class="flex items-center gap-3">
      <img id="user-avatar" src="" class="w-8 h-8 rounded-full" style="border-radius: 50% !important;">
      <button id="role-switch-btn" onclick="window.location.href='admin.html'" class="hidden text-gray-400">
        <span class="material-symbols-outlined text-[22px]">grid_view</span>
      </button>
    </div>
  </nav>

  <main id="main-content" class="pb-24">
    <div id="view-loading" class="py-24 flex flex-col items-center justify-center space-y-4">
      <div class="w-6 h-6 border-2 border-gray-200 border-t-blue-500 animate-spin" style="border-radius: 50% !important;"></div>
      <p id="loading-text" class="text-gray-300 text-[12px]">正在驗證身分...</p>
    </div>

    <div id="view-list" class="hidden">
      <div class="px-4 py-6 border-b border-gray-100 bg-gray-50/30 text-center">
        <div class="text-[14px] text-gray-400 mb-4">AI 智慧名片辨識與命理分析</div>
        <div class="flex gap-2">
          <button onclick="document.getElementById('card-camera').click()" class="btn-line-primary flex-1">辨識名片</button>
          <button id="invite-btn" onclick="window.copyInviteLink()" class="hidden px-4 border border-gray-200 text-gray-500 text-[13px]">邀請成員</button>
        </div>
        <input type="file" id="card-camera" accept="image/*" capture="environment" class="hidden">
      </div>

      <div class="px-4 py-2 border-b border-gray-50 flex items-center">
        <span class="material-symbols-outlined text-gray-300 text-[18px] mr-2">search</span>
        <input type="text" id="card-search-input" class="flex-1 h-10 bg-transparent text-[14px] outline-none" placeholder="搜尋姓名或公司...">
      </div>
      <div id="card-list-container"></div>
    </div>
  </main>

  <nav class="fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around py-2 h-16 items-center">
    <div class="flex flex-col items-center text-blue-600">
      <span class="material-symbols-outlined text-[20px]">contact_page</span>
      <span class="text-[10px] mt-1">名片</span>
    </div>
    <div class="flex flex-col items-center text-gray-300">
      <span class="material-symbols-outlined text-[20px]">psychology</span>
      <span class="text-[10px] mt-1">配對</span>
    </div>
    <div class="flex flex-col items-center text-gray-300">
      <span class="material-symbols-outlined text-[20px]">person</span>
      <span class="text-[10px] mt-1">設定</span>
    </div>
  </nav>

  <!-- 全域錯誤提示 (當 GAS 拒絕時彈出) -->
  <div id="global-error-banner" class="hidden fixed top-4 left-1/2 -translate-x-1/2 w-[90%] bg-red-600 text-white p-4 z-[9999] text-[13px]">
    <div class="flex justify-between items-start">
      <div class="flex items-center gap-1.5"><span class="material-symbols-outlined text-[18px]">warning</span>系統異常報告</div>
      <button onclick="this.parentElement.parentElement.classList.add('hidden')"><span class="material-symbols-outlined text-[16px]">close</span></button>
    </div>
    <p id="global-error-text" class="mt-2 break-all"></p>
  </div>

<script>
(function() {
  const LIFF_ID = "2008786875-DfKEEqkA"; 
  const WORKER_URL = "https://actsaas.fangwl591021.workers.dev"; 
  const SUPER_ADMINS = ["U94a7052d5af5e4f6b4efea79bfe26003"];

  let userProfile = null;
  let globalCards = [];

  window.addEventListener("unhandledrejection", (e) => {
    const errText = e.reason ? (e.reason.message || e.reason.toString()) : "未知錯誤";
    document.getElementById('global-error-text').innerText = "攔截到錯誤：\n" + errText;
    document.getElementById('global-error-banner').classList.remove('hidden');
    document.getElementById('loading-text').innerText = "發生錯誤";
  });

  async function startApp() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      userProfile = await liff.getProfile();
      document.getElementById('user-avatar').src = userProfile.pictureUrl;

      // 1. 檢查用戶身分與權限
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'checkUser', payload: { userId: userProfile.userId } })
      });
      const auth = await res.json();
      
      if (!auth.success) throw new Error("GAS 拒絕請求：" + (auth.error || "身分驗證失敗"));
      
      const role = auth.data.role;
      localStorage.setItem('actsaas_role', role);
      localStorage.setItem('actsaas_shopId', auth.data.shopId);

      if (SUPER_ADMINS.includes(userProfile.userId)) document.getElementById('role-switch-btn').classList.remove('hidden');
      if (role === 'Leader') document.getElementById('invite-btn').classList.remove('hidden');

      await loadCards();
    } catch (e) { throw e; }
  }

  async function loadCards() {
    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'getCardContacts', payload: { userId: userProfile.userId } })
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error || "無法讀取名片資料庫");
      globalCards = data.data;
      renderCards();
    } catch(e) { throw e; }
    finally { 
      document.getElementById('view-loading').classList.add('hidden');
      document.getElementById('view-list').classList.remove('hidden'); 
    }
  }

  function renderCards() {
    const container = document.getElementById('card-list-container');
    if (globalCards.length === 0) {
      container.innerHTML = '<div class="text-center py-20 text-gray-200 text-[13px]">目前無名片資料</div>';
      return;
    }
    container.innerHTML = globalCards.map(c => `
      <div class="card-row">
        <div class="w-10 h-10 bg-gray-50 flex items-center justify-center text-gray-300">
          <span class="material-symbols-outlined text-[20px]">person</span>
        </div>
        <div class="flex-1">
          <div class="text-[15px] text-gray-800">${c.name}</div>
          <div class="text-[11px] text-gray-400">${c.company || '未知公司'}</div>
        </div>
        <div class="text-[10px] text-blue-500 border border-blue-100 px-1.5 py-0.5 tracking-tight">${c.tag || '待側寫'}</div>
      </div>
    `).join('');
  }

  window.copyInviteLink = () => {
    const shopId = localStorage.getItem('actsaas_shopId');
    const inviteUrl = `https://liff.line.me/${LIFF_ID}?invite=${shopId}`;
    const el = document.createElement('textarea');
    el.value = inviteUrl; document.body.appendChild(el);
    el.select(); document.execCommand('copy'); document.body.removeChild(el);
    alert("邀請連結已複製");
  };

  window.onload = startApp;
})();
</script>
</body>
</html>
