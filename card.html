<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <link rel="icon" href="data:,">
  <title>名片管理</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

  <style type="text/tailwindcss">
    @layer base {
      body { @apply font-['Noto_Sans_TC'] bg-slate-50 text-slate-900 antialiased; -webkit-tap-highlight-color: transparent; }
      * { @apply transition-all duration-200 border-none outline-none font-normal !important; }
    }
    .input-label { @apply block text-[12px] font-bold text-slate-400 mb-2 uppercase tracking-[0.1em] pl-1; }
    .custom-input { @apply w-full h-[54px] px-4 bg-white border border-slate-100 rounded-2xl text-[15px] focus:ring-4 focus:ring-blue-500/10 placeholder-slate-300 shadow-sm; }
    .textarea-block { @apply w-full p-4 bg-white border border-slate-100 rounded-2xl text-[15px] resize-none leading-relaxed focus:ring-4 focus:ring-blue-500/10 shadow-sm; }
    .btn-primary { @apply w-full py-4 bg-blue-600 text-white rounded-[1.5rem] font-bold text-[16px] shadow-lg shadow-blue-500/20 active:scale-[0.97] flex items-center justify-center gap-2; }
    .btn-secondary { @apply w-full py-4 bg-white border border-slate-200 text-slate-700 rounded-[1.5rem] font-bold text-[16px] active:scale-[0.97] flex items-center justify-center gap-2; }
    .nav-btn { @apply flex flex-col items-center justify-center transition-all flex-1 text-slate-400 h-full; }
    .nav-active { @apply text-blue-600 font-bold; }
    .nav-active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
    .admin-nav-btn { @apply flex flex-col items-center justify-center transition-all flex-1 text-slate-500 h-full; }
    .admin-nav-active { @apply text-[#06C755] font-bold; }
    .admin-nav-active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
    .card-shadow { box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }
  </style>
</head>
<body class="flex flex-col items-center min-h-screen">

<div class="w-full max-w-md bg-white h-screen relative flex flex-col shadow-2xl overflow-hidden">
  
  <nav class="fixed top-0 w-full max-w-md z-40 bg-white/95 backdrop-blur-xl px-5 py-3.5 flex justify-between items-center left-1/2 -translate-x-1/2 border-b border-slate-50 shadow-sm">
    <div class="flex items-center gap-2.5">
      <div class="w-9 h-9 rounded-xl bg-blue-600 text-white flex items-center justify-center shadow-md">
        <span class="material-symbols-outlined text-[20px] icon-filled">contact_mail</span>
      </div>
      <div class="text-[18px] font-bold tracking-tight text-slate-800">名片管理 <span class="text-[9px] text-blue-500 bg-blue-50 px-1.5 py-0.5 rounded-md ml-1 font-black">v7.5.6</span></div>
    </div>
    <div class="flex items-center gap-3">
      <div id="user-profile-badge" class="hidden flex items-center gap-2">
        <img id="user-avatar" src="" class="w-9 h-9 rounded-full object-cover border-2 border-white shadow-sm">
      </div>
      <!-- 系統主專屬切換按鈕 -->
      <button id="role-switch-btn" onclick="window.location.href='admin.html'" class="hidden w-9 h-9 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center active:bg-slate-200">
        <span class="material-symbols-outlined text-[20px]">swap_horiz</span>
      </button>
    </div>
  </nav>

  <main id="main-content" class="flex-1 overflow-y-auto pb-32 pt-20 bg-slate-50">
    
    <div id="view-loading" class="h-full flex flex-col items-center justify-center space-y-4">
      <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
      <p id="loading-text" class="text-slate-400 font-bold text-[13px] tracking-widest">ACTMASTER 初始化</p>
    </div>

    <div id="view-list" class="hidden animate-in fade-in duration-500">
      <div id="admin-tools-container" class="px-5 pt-4">
        <section class="bg-white rounded-[2.5rem] p-8 text-center border border-slate-50 card-shadow relative overflow-hidden">
          <div class="absolute top-0 right-0 w-24 h-24 bg-blue-50 rounded-bl-full opacity-40 -z-0"></div>
          <div class="relative z-10">
            <div class="w-14 h-14 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
              <span class="material-symbols-outlined text-[30px]">document_scanner</span>
            </div>
            <h2 class="text-[18px] font-bold text-slate-800 mb-1">AI 智慧名片辨識</h2>
            <p class="text-[13px] text-slate-400 mb-6 leading-relaxed">對準名片拍照或上傳，自動萃取 AI 命理標籤。</p>
            <div class="flex gap-3">
              <button onclick="document.getElementById('card-camera').click()" class="btn-primary flex-[1.3]">開啟相機</button>
              <button onclick="document.getElementById('card-upload').click()" class="btn-secondary flex-1">相簿</button>
            </div>
            
            <!-- 店長專屬的邀請按鈕 (預設隱藏) -->
            <button id="invite-btn" onclick="window.copyInviteLink()" class="hidden mt-6 text-[12px] text-blue-600 font-bold flex items-center justify-center mx-auto gap-1 active:scale-95 bg-blue-50 px-4 py-2 rounded-full">
              <span class="material-symbols-outlined text-[16px]">person_add</span> 複製邀請連結給員工
            </button>

            <input type="file" id="card-camera" accept="image/*" capture="environment" class="hidden" onchange="window.openCropper(this)">
            <input type="file" id="card-upload" accept="image/*" class="hidden" onchange="window.openCropper(this)">
          </div>
        </section>
      </div>

      <div id="admin-search-container" class="mt-8 px-5">
        <div class="flex gap-2 mb-4">
          <input type="text" id="card-search-input" onkeyup="window.filterCardList()" class="custom-input flex-1" placeholder="搜尋姓名或公司...">
          <button id="btn-refresh-cards" onclick="window.loadCards()" class="w-[54px] h-[54px] bg-white rounded-2xl flex items-center justify-center text-slate-400 border border-slate-50 shadow-sm active:scale-95"><span class="material-symbols-outlined">refresh</span></button>
        </div>
        <div id="admin-card-list-container" class="space-y-4">
          <!-- 這裡動態渲染名片 -->
        </div>
      </div>
    </div>

    <div id="view-process" class="hidden p-5 animate-in slide-in-from-right duration-300">
      <div id="section-loading" class="bg-white rounded-[2.5rem] p-10 text-center card-shadow mt-10">
        <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
        <h3 class="text-[17px] font-bold text-slate-800">AI 深度分析中...</h3>
        <p class="text-[13px] text-slate-400 mt-1">正在萃取資訊並建立人格側寫標籤</p>
      </div>

      <div id="section-form" class="hidden space-y-6">
        <div class="flex items-center gap-4 mb-2">
          <button onclick="window.resetUI()" class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-slate-500 shadow-sm active:scale-95"><span class="material-symbols-outlined">arrow_back</span></button>
          <h2 class="text-[20px] font-bold text-slate-800">辨識結果確認</h2>
        </div>
        <div class="bg-white rounded-[2.5rem] p-6 card-shadow space-y-6 border border-slate-50">
          <img id="process-preview-image" src="" class="w-full aspect-video object-contain rounded-2xl bg-slate-50 border-2 border-dashed border-slate-100">
          <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
              <input type="text" id="f-Name" class="custom-input" placeholder="姓名">
              <input type="text" id="f-EnglishName" class="custom-input" placeholder="英文名">
            </div>
            <input type="text" id="f-CompanyName" class="custom-input" placeholder="公司名稱">
            <input type="tel" id="f-Mobile" class="custom-input" placeholder="手機號碼">
            <textarea id="f-Slogan" class="textarea-block h-24" placeholder="AI 擴寫 Slogan"></textarea>
            <button id="btn-save" onclick="window.saveToCloud()" class="btn-primary mt-4">確認存入雲端資料庫</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <nav id="bottom-nav-user" class="hidden fixed bottom-0 w-full max-w-md bg-white border-t border-slate-50 flex justify-around items-center px-1 py-2 z-40 pb-safe shadow-lg left-1/2 -translate-x-1/2 h-[76px] rounded-t-[2rem]">
    <button class="nav-btn nav-active"><span class="material-symbols-outlined">contact_mail</span><span class="text-[10px]">名片</span></button>
    <button onclick="window.location.href='index.html?view=user-profile'" class="nav-btn"><span class="material-symbols-outlined">person</span><span class="text-[10px]">設定</span></button>
  </nav>

  <nav id="bottom-nav-admin" class="hidden fixed bottom-0 w-full max-w-md bg-slate-900 border-t border-slate-800 flex justify-around items-center px-1 py-2 z-40 pb-safe shadow-lg left-1/2 -translate-x-1/2 h-[76px] rounded-t-[2rem]">
    <button class="admin-nav-btn admin-nav-active"><span class="material-symbols-outlined">recent_patient</span><span class="text-[10px]">名片</span></button>
    <button onclick="window.location.href='index.html?view=admin-crm'" class="admin-nav-btn"><span class="material-symbols-outlined">groups</span><span class="text-[10px]">CRM</span></button>
  </nav>
</div>

<div id="section-image-cropper" class="hidden fixed inset-0 bg-black z-[1000] flex flex-col">
  <div class="p-4 flex justify-between items-center text-white border-b border-slate-800">
    <button onclick="window.cancelCrop()" class="font-bold p-2 active:scale-90">取消</button>
    <button onclick="window.confirmCrop()" class="bg-blue-600 px-4 py-1.5 rounded-lg font-bold active:scale-95">完成裁切</button>
  </div>
  <div class="flex-1 flex items-center justify-center"><img id="cropper-image" class="max-w-full opacity-0"></div>
</div>

<!-- 系統錯誤全域提示區 -->
<div id="toast" class="hidden"></div>
<div id="global-error-banner" class="hidden fixed top-4 left-1/2 -translate-x-1/2 w-[90%] bg-red-600 text-white p-4 rounded-2xl shadow-2xl z-[9999] text-[13px] font-bold leading-relaxed">
  <div class="flex justify-between items-start mb-2">
    <div class="flex items-center gap-1.5"><span class="material-symbols-outlined text-[18px]">warning</span>系統異常報告</div>
    <button onclick="this.parentElement.parentElement.classList.add('hidden')" class="bg-red-800 rounded-full w-6 h-6 flex items-center justify-center"><span class="material-symbols-outlined text-[14px]">close</span></button>
  </div>
  <p id="global-error-text" class="break-all"></p>
</div>

<script>
(function() {
  const LIFF_ID = "2008786875-DfKEEqkA"; 
  const WORKER_URL = "https://actsaas.fangwl591021.workers.dev"; 
  const CACHE_KEY = "actmaster_card_cache_v1";
  
  // 系統主的 UID
  const SUPER_ADMINS = ["U94a7052d5af5e4f6b4efea79bfe26003"];

  let userProfile = null;
  let cropperInstance = null;
  let globalCards = [];
  let isAdmin = false;
  let compressedBase64 = "";

  // 攔截並顯示所有未處理錯誤
  window.addEventListener("unhandledrejection", function(event) {
    const errText = event.reason ? (event.reason.message || event.reason.toString()) : "未知錯誤";
    document.getElementById('global-error-text').innerText = "攔截到錯誤：\n" + errText;
    document.getElementById('global-error-banner').classList.remove('hidden');
    document.getElementById('loading-text').innerText = "發生錯誤，已暫停載入";
    document.getElementById('view-loading').querySelector('.animate-spin').classList.add('hidden');
  });

  async function startApp() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      userProfile = await liff.getProfile();
      
      const role = localStorage.getItem('actsaas_role');
      // 判斷是否為 SaaS 系統主
      const isSuperAdmin = SUPER_ADMINS.includes(userProfile.userId);
      // 判斷是否顯示管理員模式 (此處特指租戶內的 Leader)
      isAdmin = (role === 'Leader');
      
      document.getElementById('user-avatar').src = userProfile.pictureUrl;
      document.getElementById('user-profile-badge').classList.remove('hidden');
      
      // 開啟系統主切換按鈕
      if (isSuperAdmin) {
        document.getElementById('role-switch-btn').classList.remove('hidden');
      }
      
      // 切換底部導覽列
      if (isAdmin) {
        document.getElementById('bottom-nav-admin').classList.remove('hidden');
      } else {
        document.getElementById('bottom-nav-user').classList.remove('hidden');
      }

      // 顯示店長邀請連結
      if (isAdmin) {
        const inviteBtn = document.getElementById('invite-btn');
        if(inviteBtn) inviteBtn.classList.remove('hidden');
      }

      await window.loadCards();
    } catch (e) { 
      throw new Error("LIFF 載入失敗：" + e.message); 
    }
  }

  // 複製邀請碼給員工
  window.copyInviteLink = () => {
    const shopId = localStorage.getItem('actsaas_shopId');
    if (!shopId) return alert("無法取得您的商店代碼，請重新載入系統");

    const inviteUrl = `https://liff.line.me/${LIFF_ID}?invite=${shopId}`;
    
    const tempInput = document.createElement('input');
    tempInput.value = inviteUrl;
    document.body.appendChild(tempInput);
    tempInput.select();
    document.execCommand('copy');
    document.body.removeChild(tempInput);
    
    alert("🔗 邀請連結已複製！\n\n請將連結貼給員工，員工點擊後即可加入您的團隊空間。");
  };

  window.loadCards = async () => {
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) {
      globalCards = JSON.parse(cached);
      renderCardList();
    }

    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'getCardContacts', payload: { userId: userProfile.userId } })
      });
      
      const textResponse = await res.text();
      let data;
      try {
        data = JSON.parse(textResponse);
      } catch (e) {
        throw new Error("伺服器回傳格式異常 (請確認 GAS 是否設定為『所有人』可存取)。\n原始回覆: " + textResponse.substring(0, 100));
      }

      if (data.success) {
        globalCards = data.data;
        localStorage.setItem(CACHE_KEY, JSON.stringify(globalCards));
        renderCardList();
      } else {
        throw new Error(data.error || "GAS 拒絕請求");
      }
    } catch(e) { 
      throw e; 
    } finally { 
      window.switchView('list'); 
    }
  };

  function renderCardList() {
    const container = document.getElementById('admin-card-list-container');
    if (!container) return;

    if (globalCards.length === 0) {
      container.innerHTML = `
        <div class="text-center py-20 opacity-30">
          <span class="material-symbols-outlined text-6xl">cloud_off</span>
          <p class="text-[14px] mt-2 font-bold">目前尚無名片資料</p>
        </div>`;
      return;
    }

    container.innerHTML = globalCards.map(c => `
      <div class="p-5 bg-white rounded-3xl flex items-center gap-4 border border-slate-50 card-shadow">
        <div class="w-12 h-12 bg-slate-50 rounded-full flex items-center justify-center text-slate-300">
          <span class="material-symbols-outlined">person</span>
        </div>
        <div class="flex-1">
           <div class="font-bold text-[16px] text-slate-800">${c.name || '未知姓名'}</div>
           <div class="text-[11px] text-slate-400">${c.company || '無資訊'}</div>
        </div>
        <span class="text-[10px] bg-blue-50 text-blue-600 px-3 py-1 rounded-full font-bold">${c.tag || 'Attention'}</span>
      </div>
    `).join('');
  }

  window.switchView = (view) => {
    ['view-loading', 'view-list', 'view-process'].forEach(v => document.getElementById(v)?.classList.add('hidden'));
    document.getElementById(`view-${view}`)?.classList.remove('hidden');
  };

  window.resetUI = () => { window.switchView('list'); compressedBase64 = ""; };

  window.openCropper = (input) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = document.getElementById('cropper-image');
      img.src = e.target.result;
      document.getElementById('section-image-cropper').classList.remove('hidden');
      if (cropperInstance) cropperInstance.destroy();
      cropperInstance = new Cropper(img, { aspectRatio: NaN, viewMode: 1 });
      img.style.opacity = '1';
    };
    reader.readAsDataURL(input.files[0]);
  };

  window.cancelCrop = () => { document.getElementById('section-image-cropper').classList.add('hidden'); };

  window.confirmCrop = async () => {
    compressedBase64 = cropperInstance.getCroppedCanvas({ maxWidth: 800 }).toDataURL('image/jpeg', 0.8);
    document.getElementById('section-image-cropper').classList.add('hidden');
    document.getElementById('process-preview-image').src = compressedBase64;
    window.switchView('process');
    document.getElementById('section-loading').classList.remove('hidden');
    document.getElementById('section-form').classList.add('hidden');

    try {
      const response = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'recognizeCard', payload: { base64Image: compressedBase64.split(',')[1] } })
      });
      const res = await response.json();
      if (res.success) {
        const data = res.data;
        document.getElementById('f-Name').value = data.Name || "";
        document.getElementById('f-CompanyName').value = data.CompanyName || "";
        document.getElementById('f-Mobile').value = data.Mobile || "";
        document.getElementById('f-Slogan').value = data.Slogan || "";
        document.getElementById('section-loading').classList.add('hidden');
        document.getElementById('section-form').classList.remove('hidden');
      } else {
        throw new Error("AI 辨識失敗: " + res.error);
      }
    } catch (e) { throw e; } 
  };

  window.saveToCloud = async () => {
    const btn = document.getElementById('btn-save');
    btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> 正在儲存...';
    btn.disabled = true;
    
    const payload = {
      userId: userProfile.userId,
      Name: document.getElementById('f-Name').value,
      CompanyName: document.getElementById('f-CompanyName').value,
      Mobile: document.getElementById('f-Mobile').value,
      Slogan: document.getElementById('f-Slogan').value
    };

    try {
      const response = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'saveCard', payload })
      });
      const res = await response.json();
      if (!res.success) throw new Error(res.error);

      localStorage.removeItem(CACHE_KEY);
      window.resetUI();
      await window.loadCards();
    } catch(e) { throw e; } finally {
      btn.innerText = "確認存入雲端資料庫";
      btn.disabled = false;
    }
  };

  window.onload = startApp;
})();
</script>
</body>
</html>
