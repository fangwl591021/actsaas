      const el = document.getElementById(v);
      if (el) el.classList.add('hidden');
    });
    const target = document.getElementById(`view-${view}`);
    if (target) target.classList.remove('hidden');
  };

  window.switchProcessSection = function(id) {
    ['section-loading', 'section-form'].forEach(v => {
      const el = document.getElementById(v);
      if (el) el.classList.add('hidden');
    });
    const target = document.getElementById(id);
    if (target) target.classList.remove('hidden');
  };

  // Toast 系統
  window.showToast = function(msg, isError = false) {
    const t = document.getElementById('toast');
    if (!t) return;
    t.innerHTML = `<span class="material-symbols-outlined icon-filled">${isError ? 'error' : 'info'}</span> ${msg}`;
    t.className = `fixed top-14 left-1/2 -translate-x-1/2 px-6 py-3.5 rounded-full text-[14px] shadow-2xl transition-all font-bold flex items-center gap-2 w-max max-w-[90vw] z-[9999] ${isError ? 'bg-red-500 text-white' : 'bg-slate-800 text-white'} opacity-100`;
    t.classList.remove('hidden');
    setTimeout(() => { 
      t.style.opacity = '0'; 
      setTimeout(() => t.classList.add('hidden'), 300); 
    }, 3000); 
  };

  // 其他 JS 邏輯 (此處為節省長度，省略重複部分，但建置時需完整貼上你提供的 card.js)
  // ... (包含 fetchAPI, loadCardContacts, openCardDetailByRowId 等) ...
})();
</script>
