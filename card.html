<!-- Version: v7.6.7 (名片收割機：雙按鈕實體化、內嵌相機與 29 欄位同步版) -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>名片收割機</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

  <style type="text/tailwindcss">
    @layer base {
      body { @apply font-['Noto_Sans_TC'] bg-white text-gray-800 antialiased font-normal; -webkit-tap-highlight-color: transparent; }
      * { @apply font-normal !important; border-radius: 0 !important; }
    }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; vertical-align: middle; }
    .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 400; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
    
    /* LINE OA 原生底線樣式 */
    .input-label { @apply block text-[11px] text-gray-400 mb-1 uppercase tracking-widest pl-0; }
    .custom-input { @apply w-full h-[40px] px-0 bg-transparent border-b border-gray-100 outline-none text-[15px] focus:border-blue-500 transition-colors placeholder-gray-200 mb-4; }
    .textarea-block { @apply w-full p-3 bg-gray-50 border-none outline-none text-[14px] text-gray-800 resize-none leading-relaxed placeholder-gray-300 mb-4; }
    
    .btn-line-primary { @apply w-full py-4 bg-blue-600 text-white text-[16px] active:opacity-80 transition-all flex items-center justify-center gap-2; }
    .btn-line-secondary { @apply w-full py-4 bg-white border border-gray-200 text-gray-700 text-[16px] active:bg-gray-50 flex items-center justify-center gap-2; }
    
    .nav-btn { @apply flex flex-col items-center justify-center transition-all flex-1 text-gray-400 h-full; min-width: 48px; }
    .nav-active { @apply text-blue-600; }
    .nav-active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
    .card-row { @apply px-4 py-4 border-b border-gray-50 flex items-center gap-4 active:bg-gray-50 transition-colors; }
    
    #view-camera { z-index: 3000; }
    #section-image-cropper { z-index: 4000; }
  </style>
</head>
<body class="w-full min-h-screen bg-white">

<div class="w-full bg-white min-h-screen relative flex flex-col shadow-none">
  
  <!-- 頂部導航 -->
  <nav class="sticky top-0 w-full z-40 bg-white px-4 py-3.5 flex justify-between items-center border-b border-gray-100">
    <div class="text-[16px] text-gray-800 flex items-center gap-2 tracking-tight">
      <span class="material-symbols-outlined text-[20px] text-blue-600">contact_mail</span>
      名片收割機 <span class="text-[9px] text-blue-600 bg-blue-50 px-1.5 py-0.5 ml-1">v7.6.7</span>
    </div>
    <div class="flex items-center gap-3">
      <img id="user-avatar" src="" class="w-8 h-8 rounded-full" style="border-radius: 50% !important;">
      <button id="role-switch-btn" onclick="window.location.href='admin.html'" class="hidden text-gray-400 p-1">
        <span class="material-symbols-outlined text-[22px]">grid_view</span>
      </button>
    </div>
  </nav>

  <main id="main-content" class="flex-1 pb-32">
    
    <!-- 載入中 -->
    <div id="view-loading" class="py-24 flex flex-col items-center justify-center space-y-4">
      <div class="w-6 h-6 border-2 border-gray-200 border-t-blue-500 animate-spin" style="border-radius: 50% !important;"></div>
      <p id="loading-text" class="text-gray-300 text-[12px] tracking-widest">正在載入...</p>
    </div>

    <!-- 主列表視圖 -->
    <div id="view-list" class="hidden">
      <!-- 雙按鈕配置區域 -->
      <div class="px-4 py-8 border-b border-gray-100 bg-gray-50/30 text-center">
        <div class="text-[14px] text-gray-400 mb-6 tracking-tight">AI 智慧辨識與收割人脈</div>
        
        <div class="flex flex-col gap-3 px-4">
          <button onclick="window.openLiveCamera()" class="btn-line-primary">
            <span class="material-symbols-outlined text-[20px]">photo_camera</span> 拍照辨識
          </button>
          <button onclick="document.getElementById('album-input').click()" class="btn-line-secondary">
            <span class="material-symbols-outlined text-[20px]">image</span> 從相簿選取
          </button>
        </div>
        
        <input type="file" id="album-input" accept="image/*" class="hidden" onchange="window.handleAlbumSelect(this)">
        
        <button id="invite-btn" onclick="window.copyInviteLink()" class="hidden mt-6 text-[12px] text-blue-600 flex items-center justify-center mx-auto gap-1 active:opacity-50">
          <span class="material-symbols-outlined text-[16px]">person_add</span> 邀請成員加入團隊
        </button>
      </div>

      <div class="px-4 py-2 border-b border-gray-50 flex items-center bg-white sticky top-[53px] z-30">
        <span class="material-symbols-outlined text-gray-300 text-[18px] mr-2">search</span>
        <input type="text" id="card-search-input" onkeyup="window.filterCardList()" class="flex-1 h-10 bg-transparent text-[14px] outline-none placeholder-gray-200" placeholder="搜尋姓名、公司或標語...">
        <button onclick="window.reloadCardContacts()" class="text-gray-300 ml-2 p-1 active:bg-gray-50 transition-colors"><span class="material-symbols-outlined">refresh</span></button>
      </div>
      
      <div id="admin-card-list-container" class="flex flex-col">
        <!-- 列表動態渲染 -->
      </div>
    </div>

    <!-- 辨識處理與表單視圖 (29 欄位) -->
    <div id="view-process" class="hidden animate-in slide-in-from-right duration-300">
      <div class="px-4 py-3 border-b border-gray-100 flex items-center gap-3 bg-white sticky top-[53px] z-30">
        <button onclick="window.resetUI()" class="text-gray-400 p-1"><span class="material-symbols-outlined">arrow_back</span></button>
        <div class="text-[15px]">辨識資料核對</div>
      </div>

      <div id="section-loading" class="hidden py-20 text-center">
        <div class="w-6 h-6 border-2 border-gray-200 border-t-blue-500 animate-spin mx-auto mb-3" style="border-radius: 50% !important;"></div>
        <div class="text-[12px] text-gray-400 tracking-widest uppercase">AI Harvesting...</div>
      </div>

      <div id="section-form" class="hidden p-6 pb-24 space-y-1">
        <div class="w-full aspect-video bg-gray-50 mb-8 flex items-center justify-center border-b border-gray-100 overflow-hidden">
          <img id="process-preview-image" src="" class="w-full h-full object-contain">
        </div>

        <!-- 29 欄位連動表單 -->
        <div class="grid grid-cols-2 gap-x-6">
          <div><label class="input-label">姓名</label><input type="text" id="f-Name" class="custom-input"></div>
          <div><label class="input-label">英文名/別名</label><input type="text" id="f-EnglishName" class="custom-input"></div>
        </div>
        <div class="grid grid-cols-2 gap-x-6">
          <div><label class="input-label">職稱</label><input type="text" id="f-Title" class="custom-input"></div>
          <div><label class="input-label">部門</label><input type="text" id="f-Department" class="custom-input"></div>
        </div>
        <div><label class="input-label">公司名稱</label><input type="text" id="f-CompanyName" class="custom-input"></div>
        <div class="grid grid-cols-2 gap-x-6">
          <div><label class="input-label">統一編號</label><input type="text" id="f-TaxID" class="custom-input"></div>
          <div><label class="input-label">手機號碼</label><input type="tel" id="f-Mobile" class="custom-input"></div>
        </div>
        <div class="grid grid-cols-3 gap-x-4">
          <div class="col-span-2"><label class="input-label">公司電話</label><input type="text" id="f-Tel" class="custom-input"></div>
          <div><label class="input-label">分機</label><input type="text" id="f-Ext" class="custom-input"></div>
        </div>
        <div class="grid grid-cols-2 gap-x-6">
          <div><label class="input-label">傳真</label><input type="text" id="f-Fax" class="custom-input"></div>
          <div><label class="input-label">電子郵件</label><input type="email" id="f-Email" class="custom-input"></div>
        </div>
        <div><label class="input-label">公司地址</label><input type="text" id="f-Address" class="custom-input"></div>
        <div class="grid grid-cols-2 gap-x-6">
          <div><label class="input-label">公司網址</label><input type="url" id="f-Website" class="custom-input"></div>
          <div><label class="input-label">社群帳號</label><input type="text" id="f-SocialMedia" class="custom-input"></div>
        </div>
        <div class="grid grid-cols-2 gap-x-6">
          <div><label class="input-label">LINE ID</label><input type="text" id="f-LineID" class="custom-input"></div>
          <div><label class="input-label text-blue-500">自訂設定 (Config)</label><input type="text" id="f-Config" class="custom-input" placeholder="{}"></div>
        </div>
        
        <div class="pt-4">
          <label class="input-label">服務項目 / 品牌標語</label>
          <textarea id="f-Slogan" class="textarea-block h-20 text-[13px]"></textarea>
        </div>
        <div class="pt-2">
          <label class="input-label">建檔人 / 互動備註</label>
          <textarea id="f-Notes" class="textarea-block h-20 text-[13px]" placeholder="輸入您對此人的筆記..."></textarea>
        </div>

        <button id="btn-save" onclick="window.saveToCloud()" class="btn-line-primary mt-8 shadow-lg shadow-blue-500/10">確認存入年度雲端庫</button>
      </div>
    </div>
  </main>

  <!-- 即時相機視圖 (Live Camera Stream) -->
  <div id="view-camera" class="hidden fixed inset-0 bg-black flex flex-col">
    <div class="absolute top-0 w-full p-4 flex justify-between items-center text-white z-50">
      <button onclick="window.closeCamera()" class="p-2 opacity-60"><span class="material-symbols-outlined text-[28px]">close</span></button>
      <div class="text-[14px] tracking-[0.2em] font-medium">SCANNING CARD</div>
      <div class="w-10"></div>
    </div>
    <video id="camera-video" autoplay playsinline class="w-full h-full object-cover"></video>
    
    <!-- 掃描框輔助線 -->
    <div class="absolute inset-0 border-[40px] border-black/40 pointer-events-none flex items-center justify-center">
      <div class="w-full aspect-[20/13] border-2 border-white/20 relative">
         <div class="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-white"></div>
         <div class="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-white"></div>
         <div class="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-white"></div>
         <div class="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-white"></div>
      </div>
    </div>

    <div class="absolute bottom-10 w-full flex flex-col items-center gap-6 z-50">
      <button onclick="window.capturePhoto()" class="w-20 h-20 rounded-full border-[6px] border-white/30 flex items-center justify-center active:scale-90 transition-transform">
        <div class="w-14 h-14 bg-white rounded-full"></div>
      </button>
      <p class="text-white/40 text-[10px] tracking-widest uppercase">Tap to catch information</p>
    </div>
  </div>

  <!-- 裁切器視圖 (Cropper.js) -->
  <div id="section-image-cropper" class="hidden fixed inset-0 bg-black flex flex-col">
    <div class="px-4 py-3 flex justify-between items-center text-white bg-black/80 backdrop-blur-md absolute top-0 w-full z-50">
      <button onclick="window.cancelCrop()" class="text-gray-400 px-3 py-1">取消</button>
      <div class="text-[14px]">縮放並移動名片</div>
      <button onclick="window.confirmCrop()" class="bg-blue-600 px-4 py-1 text-[14px]">完成</button>
    </div>
    <div class="flex-1 flex items-center justify-center bg-black">
      <img id="cropper-image" src="" class="max-w-full opacity-0 transition-opacity duration-300">
    </div>
  </div>

  <!-- 底部選單 -->
  <nav id="bottom-nav-user" class="hidden fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around py-2 h-16 items-center z-40">
    <div class="nav-btn nav-active"><span class="material-symbols-outlined text-[22px]">contact_page</span><span class="text-[10px] mt-1">名片</span></div>
    <div onclick="window.location.href='fate.html'" class="nav-btn text-gray-300"><span class="material-symbols-outlined text-[22px]">psychology</span><span class="text-[10px] mt-1">配對</span></div>
    <div onclick="window.location.href='index.html'" class="nav-btn text-gray-300"><span class="material-symbols-outlined text-[22px]">person</span><span class="text-[10px] mt-1">設定</span></div>
  </nav>

  <nav id="bottom-nav-admin" class="hidden fixed bottom-0 w-full bg-slate-900 border-t border-slate-800 flex justify-around py-2 h-16 items-center z-40">
    <div class="admin-nav-btn text-blue-500"><span class="material-symbols-outlined text-[22px] icon-filled">contact_page</span><span class="text-[10px] mt-1">名片</span></div>
    <div onclick="window.location.href='index.html'" class="admin-nav-btn text-gray-500"><span class="material-symbols-outlined text-[22px]">groups</span><span class="text-[10px] mt-1">CRM</span></div>
    <div onclick="window.location.href='fate.html'" class="admin-nav-btn text-gray-500"><span class="material-symbols-outlined text-[22px]">psychology</span><span class="text-[10px] mt-1">配對</span></div>
  </nav>

  <!-- 異常提醒 -->
  <div id="global-error-banner" class="hidden fixed top-4 left-1/2 -translate-x-1/2 w-[90%] bg-red-600 text-white p-4 z-[9999] text-[13px] shadow-2xl">
    <div class="flex justify-between items-start font-medium">
      <div class="flex items-center gap-1.5"><span class="material-symbols-outlined text-[18px]">warning</span>異常報告</div>
      <button onclick="this.parentElement.parentElement.classList.add('hidden')"><span class="material-symbols-outlined text-[16px]">close</span></button>
    </div>
    <p id="global-error-text" class="mt-2 break-all opacity-80 leading-relaxed"></p>
  </div>
</div>

<script>
(function() {
  const LIFF_ID = "2008786875-DfKEEqkA"; 
  const WORKER_URL = "https://actsaas.fangwl591021.workers.dev"; 
  const SUPER_ADMINS = ["U94a7052d5af5e4f6b4efea79bfe26003"];

  let userProfile = null, globalCards = [], cropperInstance = null, lastAiFateTags = null, cameraStream = null, croppedBase64 = null;

  window.addEventListener("unhandledrejection", (e) => {
    document.getElementById('global-error-text').innerText = e.reason?.message || e.reason;
    document.getElementById('global-error-banner').classList.remove('hidden');
    document.getElementById('view-loading').classList.add('hidden');
  });

  async function startApp() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      userProfile = await liff.getProfile();
      document.getElementById('user-avatar').src = userProfile.pictureUrl;

      const res = await fetch(WORKER_URL, { 
        method: 'POST', 
        headers: { 'Content-Type': 'application/json' }, 
        body: JSON.stringify({ action: 'checkUser', payload: { userId: userProfile.userId } }) 
      });
      const auth = await res.json();
      
      const isSuperAdmin = SUPER_ADMINS.includes(userProfile.userId);
      if (!auth.success || !auth.data.isAuthorized) {
        if (!isSuperAdmin) { window.location.replace('register.html'); return; }
        localStorage.setItem('actsaas_role', 'Guest');
      } else {
        localStorage.setItem('actsaas_role', auth.data.role);
        localStorage.setItem('actsaas_shopId', auth.data.shopId);
      }

      const role = localStorage.getItem('actsaas_role');
      if (isSuperAdmin) document.getElementById('role-switch-btn').classList.remove('hidden');
      if (role === 'Leader') {
        document.getElementById('invite-btn').classList.remove('hidden');
        document.getElementById('bottom-nav-admin').classList.remove('hidden');
      } else {
        document.getElementById('bottom-nav-user').classList.remove('hidden');
      }

      if (auth.data && auth.data.isAuthorized) await loadCards();
      else {
        document.getElementById('view-loading').classList.add('hidden');
        document.getElementById('view-list').classList.remove('hidden');
        document.getElementById('admin-card-list-container').innerHTML = '<div class="text-center py-24 text-gray-300 text-[13px] tracking-widest uppercase">No Records Found</div>';
      }
    } catch (e) { console.error(e); }
  }

  // --- 相機與相簿處理 ---
  window.openLiveCamera = async () => {
    try {
      cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
      const video = document.getElementById('camera-video');
      video.srcObject = cameraStream;
      document.getElementById('view-camera').classList.remove('hidden');
    } catch (e) { 
      alert("無法啟動相機。若在 LINE 內請確認是否已授權相機存取，或改用『從相簿選取』。"); 
    }
  };

  window.closeCamera = () => {
    if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
    document.getElementById('view-camera').classList.add('hidden');
    cameraStream = null;
  };

  window.capturePhoto = () => {
    const video = document.getElementById('camera-video');
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
    window.closeCamera();
    window.startCropper(dataUrl);
  };

  window.handleAlbumSelect = (input) => {
    if (!input.files?.[0]) return;
    const reader = new FileReader();
    reader.onload = (e) => window.startCropper(e.target.result);
    reader.readAsDataURL(input.files[0]);
  };

  window.startCropper = (imgData) => {
    const img = document.getElementById('cropper-image');
    img.src = imgData;
    document.getElementById('section-image-cropper').classList.remove('hidden');
    if (cropperInstance) cropperInstance.destroy();
    img.onload = () => {
      img.style.opacity = '1';
      cropperInstance = new Cropper(img, { aspectRatio: NaN, viewMode: 1, autoCropArea: 0.85 });
    };
  };

  window.cancelCrop = () => {
    document.getElementById('section-image-cropper').classList.add('hidden');
    if (cropperInstance) cropperInstance.destroy();
    document.getElementById('album-input').value = '';
  };

  window.confirmCrop = async () => {
    const canvas = cropperInstance.getCroppedCanvas({ maxWidth: 1024 });
    croppedBase64 = canvas.toDataURL('image/jpeg', 0.85);
    window.cancelCrop();
    document.getElementById('process-preview-image').src = croppedBase64;
    window.switchView('process');
    
    document.getElementById('section-loading').classList.remove('hidden');
    document.getElementById('section-form').classList.add('hidden');

    try {
      const res = await fetch(WORKER_URL, { 
        method: 'POST', 
        headers: { 'Content-Type': 'application/json' }, 
        body: JSON.stringify({ action: 'recognizeCard', payload: { base64Image: croppedBase64.split(',')[1] } }) 
      });
      const data = await res.json();
      if (data.success) {
        const c = data.data;
        document.getElementById('f-Name').value = c.Name || '';
        document.getElementById('f-EnglishName').value = c.EnglishName || '';
        document.getElementById('f-Title').value = c.Title || '';
        document.getElementById('f-Department').value = c.Department || '';
        document.getElementById('f-CompanyName').value = c.CompanyName || '';
        document.getElementById('f-TaxID').value = c.TaxID || '';
        document.getElementById('f-Slogan').value = c.Slogan || '';
        document.getElementById('f-Mobile').value = c.Mobile || '';
        document.getElementById('f-Tel').value = c.Tel || '';
        document.getElementById('f-Ext').value = c.Ext || '';
        document.getElementById('f-Fax').value = c.Fax || '';
        document.getElementById('f-Address').value = c.Address || '';
        document.getElementById('f-Email').value = c.Email || '';
        document.getElementById('f-Website').value = c.Website || '';
        document.getElementById('f-SocialMedia').value = c.SocialMedia || '';
        document.getElementById('f-LineID').value = c.LineID || '';
        lastAiFateTags = { 
          Personality: c.Personality || '', 
          Hobbies: c.Hobbies || '', 
          Wealth: c.Wealth || '', 
          Health: c.Health || '', 
          Career: c.Career || '' 
        };
      }
    } catch (e) { console.error("OCR Failed", e); }
    finally {
      document.getElementById('section-loading').classList.add('hidden');
      document.getElementById('section-form').classList.remove('hidden');
    }
  };

  // --- 資料同步 ---
  window.saveToCloud = async () => {
    const btn = document.getElementById('btn-save'); 
    btn.disabled = true; 
    btn.innerText = "加密上傳中...";
    
    const payload = { 
      userId: userProfile.userId, 
      Name: document.getElementById('f-Name').value, 
      EnglishName: document.getElementById('f-EnglishName').value, 
      Title: document.getElementById('f-Title').value, 
      Department: document.getElementById('f-Department').value, 
      CompanyName: document.getElementById('f-CompanyName').value, 
      TaxID: document.getElementById('f-TaxID').value, 
      Slogan: document.getElementById('f-Slogan').value, 
      Mobile: document.getElementById('f-Mobile').value, 
      Tel: document.getElementById('f-Tel').value, 
      Ext: document.getElementById('f-Ext').value, 
      Fax: document.getElementById('f-Fax').value, 
      Address: document.getElementById('f-Address').value, 
      Email: document.getElementById('f-Email').value, 
      Website: document.getElementById('f-Website').value, 
      SocialMedia: document.getElementById('f-SocialMedia').value, 
      LineID: document.getElementById('f-LineID').value, 
      Notes: document.getElementById('f-Notes').value, 
      Config: document.getElementById('f-Config').value,
      ImageUrl: croppedBase64,
      ...lastAiFateTags 
    };

    try {
      const res = await fetch(WORKER_URL, { 
        method: 'POST', 
        headers: { 'Content-Type': 'application/json' }, 
        body: JSON.stringify({ action: 'saveCard', payload }) 
      });
      if ((await res.json()).success) { 
        alert("✅ 資料已同步至 Google 雲端年度表！");
        window.resetUI(); 
        await loadCards(); 
      }
    } catch (e) { alert("網路傳輸異常"); }
    finally { 
      btn.disabled = false; 
      btn.innerText = "確認存入年度雲端庫"; 
    }
  };

  window.loadCards = async () => {
    try {
      const res = await fetch(WORKER_URL, { 
        method: 'POST', 
        headers: { 'Content-Type': 'application/json' }, 
        body: JSON.stringify({ action: 'getCardContacts', payload: { userId: userProfile.userId } }) 
      });
      const data = await res.json(); 
      globalCards = data.success ? data.data : [];
      const container = document.getElementById('admin-card-list-container');
      if (!globalCards.length) {
        container.innerHTML = '<div class="text-center py-20 text-gray-200 text-[13px] tracking-widest">NO RECORDS</div>';
      } else {
        container.innerHTML = globalCards.map(c => `
          <div class="card-row">
            <div class="w-10 h-10 bg-gray-50 flex items-center justify-center text-gray-200">
              <span class="material-symbols-outlined text-[22px]">person</span>
            </div>
            <div class="flex-1">
              <div class="text-[15px] text-gray-800 tracking-tight">${c.name}</div>
              <div class="text-[11px] text-gray-400 mt-0.5">${c.company || '未知機構'}</div>
            </div>
            <div class="text-[10px] text-blue-600 bg-blue-50 px-1.5 py-0.5 border border-blue-100">${c.tag || 'New'}</div>
          </div>
        `).join('');
      }
    } catch(e) {}
    finally { 
      document.getElementById('view-loading').classList.add('hidden'); 
      document.getElementById('view-list').classList.remove('hidden'); 
    }
  };

  window.filterCardList = () => {
    const q = document.getElementById('card-search-input').value.toLowerCase();
    const rows = document.querySelectorAll('.card-row');
    rows.forEach(r => {
      r.style.display = r.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
    });
  };

  window.reloadCardContacts = () => { 
    document.getElementById('view-list').classList.add('hidden'); 
    document.getElementById('view-loading').classList.remove('hidden'); 
    loadCards(); 
  };
  
  window.switchView = (view) => { 
    ['view-list', 'view-process'].forEach(id => document.getElementById(id).classList.add('hidden')); 
    document.getElementById(`view-${view}`).classList.remove('hidden'); 
  };
  
  window.resetUI = () => { 
    window.switchView('list'); 
    lastAiFateTags = null; 
    croppedBase64 = null; 
    document.getElementById('album-input').value = '';
  };
  
  window.copyInviteLink = () => { 
    const shopId = localStorage.getItem('actsaas_shopId');
    const inviteUrl = `https://liff.line.me/${LIFF_ID}?invite=${shopId}`; 
    const el = document.createElement('textarea'); el.value = inviteUrl; document.body.appendChild(el); 
    el.select(); document.execCommand('copy'); document.body.removeChild(el); 
    alert("邀請連結已複製至剪貼簿！"); 
  };

  window.onload = startApp;
})();
</script>
</body>
</html>
