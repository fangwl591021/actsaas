<!-- Version: v7.5.6 (名片收割機：QQ 擴充版 - LINE OA 原生資訊流優化) -->
<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <link rel="icon" href="data:,">
  <title>名片收割機</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

  <script id="tailwind-config">
    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#2563eb", 
            "primary-light": "#eff6ff",
            background: "#ffffff",
            "text-main": "#0f172a",
            "text-muted": "#64748b",
            error: "#ef4444" 
          },
          fontFamily: {
            headline: ["Manrope", "Noto Sans TC", "sans-serif"],
            sans: ["Inter", "Noto Sans TC", "sans-serif"],
          }
        },
      },
    };
  </script>
  
  <style type="text/tailwindcss">
    @layer base {
      body { @apply font-['Noto_Sans_TC'] bg-white text-gray-800 antialiased font-normal; -webkit-tap-highlight-color: transparent; }
      * { @apply font-normal !important; border-radius: 0 !important; }
    }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; vertical-align: middle; }
    .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 400; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
    
    .input-label { @apply block text-[12px] text-gray-400 mb-2 uppercase tracking-widest pl-1; }
    .custom-input { @apply w-full h-[48px] px-0 bg-transparent border-b border-gray-100 outline-none text-[15px] focus:border-primary transition-colors placeholder-gray-300; }
    .textarea-block { @apply w-full p-4 bg-gray-50 border-none outline-none text-[15px] text-gray-800 resize-none leading-relaxed placeholder-gray-300; }
    
    .btn-primary { @apply w-full py-4 bg-primary text-white text-[16px] active:opacity-80 transition-all flex items-center justify-center gap-2; }
    .btn-secondary { @apply w-full py-4 bg-white border border-gray-200 text-gray-700 text-[16px] active:bg-gray-50 transition-all flex items-center justify-center gap-2; }
    
    .nav-btn { @apply flex flex-col items-center justify-center transition-all flex-1 text-gray-400 h-full; min-width: 48px; }
    .nav-active { @apply text-primary; }
    .nav-active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }

    .admin-nav-btn { @apply flex flex-col items-center justify-center transition-all flex-1 text-gray-500 h-full; min-width: 48px; }
    .admin-nav-active { @apply text-[#06C755]; }
    .admin-nav-active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }

    .card-row { @apply px-4 py-4 border-b border-gray-50 flex items-center gap-4 active:bg-gray-50 transition-colors; }
    
    .bottom-sheet-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="w-full min-h-screen flex flex-col items-center">

<div class="w-full bg-white min-h-screen relative flex flex-col">
  
  <!-- 頂部導航 -->
  <nav class="sticky top-0 w-full z-40 bg-white px-4 py-3.5 flex justify-between items-center border-b border-gray-100">
    <div class="text-[16px] text-gray-800 flex items-center gap-2 tracking-tight">
      <span class="material-symbols-outlined text-[20px] text-primary">contact_mail</span>
      名片收割機 <span class="text-[9px] text-primary bg-primary-light px-1 py-0.5 ml-1">v7.5.6</span>
    </div>
    <div class="flex items-center gap-3">
      <div id="user-profile-badge" class="hidden flex items-center gap-2">
        <img id="user-avatar" src="" class="w-8 h-8 rounded-full object-cover" style="border-radius: 50% !important;">
      </div>
      <button id="role-switch-btn" onclick="window.location.href='admin.html'" class="hidden text-gray-400 p-1">
        <span class="material-symbols-outlined text-[22px]">grid_view</span>
      </button>
    </div>
  </nav>

  <main id="main-content" class="flex-1 pb-32">
    
    <!-- 載入動畫 -->
    <div id="view-loading" class="py-24 flex flex-col items-center justify-center space-y-4">
      <div class="w-6 h-6 border-2 border-gray-200 border-t-primary animate-spin" style="border-radius: 50% !important;"></div>
      <p id="loading-text" class="text-gray-300 text-[12px] tracking-widest">身分驗證中</p>
    </div>

    <!-- 主列表 -->
    <div id="view-list" class="hidden">
      <div id="admin-tools-container" class="px-4 py-6 border-b border-gray-100 bg-gray-50/30 text-center">
        <div class="text-[14px] text-gray-400 mb-4">AI 智慧名片辨識與命理分析</div>
        <div class="flex gap-2">
          <button onclick="document.getElementById('card-camera').click()" class="btn-primary flex-1">辨識名片</button>
          <button id="invite-btn" onclick="window.copyInviteLink()" class="hidden px-4 border border-gray-200 text-gray-500 text-[13px]">邀請成員</button>
        </div>
        <input type="file" id="card-camera" accept="image/*" capture="environment" class="hidden" onchange="window.openCropper(this, 'card')">
        <input type="file" id="card-upload" accept="image/*" class="hidden" onchange="window.openCropper(this, 'card')">
      </div>

      <div class="px-4 py-2 border-b border-gray-50 flex items-center bg-white sticky top-[53px] z-30">
        <span class="material-symbols-outlined text-gray-300 text-[18px] mr-2">search</span>
        <input type="text" id="card-search-input" onkeyup="window.filterCardList()" class="flex-1 h-10 bg-transparent text-[14px] outline-none" placeholder="搜尋姓名或公司...">
        <button onclick="window.reloadCardContacts()" class="text-gray-300 ml-2"><span class="material-symbols-outlined">refresh</span></button>
      </div>
      
      <div id="admin-card-list-container" class="flex flex-col"></div>
    </div>

    <!-- 辨識處理表單 -->
    <div id="view-process" class="hidden animate-in slide-in-from-right duration-300">
      <div class="px-4 py-3 border-b border-gray-100 flex items-center gap-3 bg-white sticky top-[53px] z-30">
        <button onclick="window.resetUI()" class="text-gray-400"><span class="material-symbols-outlined">arrow_back</span></button>
        <div class="text-[15px] text-gray-800">辨識結果確認</div>
      </div>

      <div id="section-loading" class="hidden py-20 text-center">
        <div class="w-6 h-6 border-2 border-gray-200 border-t-primary animate-spin mx-auto mb-3" style="border-radius: 50% !important;"></div>
        <div class="text-[12px] text-gray-400">AI 分析中，請稍候...</div>
      </div>

      <div id="section-form" class="hidden p-4 space-y-6">
        <div class="w-full aspect-video bg-gray-50 overflow-hidden mb-6 flex items-center justify-center">
          <img id="process-preview-image" src="" class="w-full h-full object-contain">
        </div>

        <div class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div><label class="input-label">姓名</label><input type="text" id="f-Name" class="custom-input"></div>
            <div><label class="input-label">英文名</label><input type="text" id="f-EnglishName" class="custom-input"></div>
          </div>
          <div><label class="input-label">公司名稱</label><input type="text" id="f-CompanyName" class="custom-input"></div>
          <div class="grid grid-cols-2 gap-4">
            <div><label class="input-label">職稱</label><input type="text" id="f-Title" class="custom-input"></div>
            <div><label class="input-label">手機號碼</label><input type="tel" id="f-Mobile" class="custom-input"></div>
          </div>
          <div><label class="input-label">品牌標語 (AI 擴寫)</label><textarea id="f-Slogan" class="textarea-block h-24 text-[13px]"></textarea></div>
        </div>

        <button id="btn-save" onclick="window.saveToCloud()" class="btn-primary mt-8">確認存入雲端庫</button>
      </div>
    </div>
  </main>

  <!-- 底部選單 -->
  <nav id="bottom-nav-user" class="hidden fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around py-2 h-16 items-center z-40">
    <div class="nav-btn nav-active"><span class="material-symbols-outlined text-[20px]">contact_page</span><span class="text-[10px] mt-1">名片</span></div>
    <div class="nav-btn text-gray-300"><span class="material-symbols-outlined text-[20px]">psychology</span><span class="text-[10px] mt-1">配對</span></div>
    <div class="nav-btn text-gray-300"><span class="material-symbols-outlined text-[20px]">person</span><span class="text-[10px] mt-1">設定</span></div>
  </nav>

  <nav id="bottom-nav-admin" class="hidden fixed bottom-0 w-full bg-slate-900 border-t border-slate-800 flex justify-around py-2 h-16 items-center z-40">
    <div class="admin-nav-btn admin-nav-active"><span class="material-symbols-outlined text-[20px]">contact_page</span><span class="text-[10px] mt-1">名片</span></div>
    <div class="admin-nav-btn text-gray-500"><span class="material-symbols-outlined text-[20px]">groups</span><span class="text-[10px] mt-1">CRM</span></div>
    <div class="admin-nav-btn text-gray-500"><span class="material-symbols-outlined text-[20px]">settings</span><span class="text-[10px] mt-1">參數</span></div>
  </nav>

  <!-- 全域錯誤提示 -->
  <div id="global-error-banner" class="hidden fixed top-4 left-1/2 -translate-x-1/2 w-[90%] bg-red-600 text-white p-4 z-[9999] text-[13px]">
    <div class="flex justify-between items-start">
      <div class="flex items-center gap-1.5"><span class="material-symbols-outlined text-[18px]">warning</span>系統異常報告</div>
      <button onclick="this.parentElement.parentElement.classList.add('hidden')"><span class="material-symbols-outlined text-[16px]">close</span></button>
    </div>
    <p id="global-error-text" class="mt-2 break-all"></p>
  </div>
</div>

<script>
(function() {
  const LIFF_ID = "2008786875-DfKEEqkA"; 
  const WORKER_URL = "https://actsaas.fangwl591021.workers.dev"; 
  const SUPER_ADMINS = ["U94a7052d5af5e4f6b4efea79bfe26003"];

  let userProfile = null;
  let globalCards = [];
  let cropper = null;

  window.addEventListener("unhandledrejection", (e) => {
    const errText = e.reason ? (e.reason.message || e.reason.toString()) : "未知錯誤";
    document.getElementById('global-error-text').innerText = "攔截到錯誤：\n" + errText;
    document.getElementById('global-error-banner').classList.remove('hidden');
    document.getElementById('loading-text').innerText = "連線失敗";
  });

  async function startApp() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      userProfile = await liff.getProfile();
      document.getElementById('user-avatar').src = userProfile.pictureUrl;
      document.getElementById('user-profile-badge').classList.remove('hidden');

      // 身分驗證
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'checkUser', payload: { userId: userProfile.userId } })
      });
      const auth = await res.json();
      if (!auth.success) throw new Error("GAS 拒絕請求：" + (auth.error || "權限不足"));
      
      localStorage.setItem('actsaas_role', auth.data.role);
      localStorage.setItem('actsaas_shopId', auth.data.shopId);

      if (SUPER_ADMINS.includes(userProfile.userId)) document.getElementById('role-switch-btn').classList.remove('hidden');
      if (auth.data.role === 'Leader') document.getElementById('invite-btn').classList.remove('hidden');
      
      // 切換導覽列
      if (auth.data.role === 'Leader') document.getElementById('bottom-nav-admin').classList.remove('hidden');
      else document.getElementById('bottom-nav-user').classList.remove('hidden');

      await loadCards();
    } catch (e) { throw e; }
  }

  async function loadCards() {
    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'getCardContacts', payload: { userId: userProfile.userId } })
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error);
      globalCards = data.data;
      renderCards();
    } catch(e) { throw e; }
    finally { 
      document.getElementById('view-loading').classList.add('hidden');
      document.getElementById('view-list').classList.remove('hidden'); 
    }
  }

  function renderCards() {
    const container = document.getElementById('admin-card-list-container');
    if (globalCards.length === 0) {
      container.innerHTML = '<div class="text-center py-20 text-gray-200 text-[13px]">目前無名片資料</div>';
      return;
    }
    container.innerHTML = globalCards.map(c => `
      <div class="card-row">
        <div class="w-10 h-10 bg-gray-50 flex items-center justify-center text-gray-200">
          <span class="material-symbols-outlined text-[20px]">person</span>
        </div>
        <div class="flex-1">
          <div class="text-[15px] text-gray-800">${c.name}</div>
          <div class="text-[11px] text-gray-400">${c.company || '未知公司'}</div>
        </div>
        <div class="text-[10px] text-blue-500 border border-blue-50 px-1.5 py-0.5 tracking-tight">${c.tag || 'New'}</div>
      </div>
    `).join('');
  }

  window.openCropper = (input) => {
    const file = input.files[0];
    const reader = new FileReader();
    reader.onload = (e) => {
      document.getElementById('process-preview-image').src = e.target.result;
      window.switchView('process');
      document.getElementById('section-loading').classList.remove('hidden');
      simulateOCR(); // 這裡應改為實際 Worker OCR 呼叫
    };
    reader.readAsDataURL(file);
  };

  async function simulateOCR() {
    // 這裡應對接你的 Worker: recognizeCard
    setTimeout(() => {
      document.getElementById('f-Name').value = "陳小明";
      document.getElementById('f-CompanyName').value = "名片收割機科技";
      document.getElementById('f-Slogan').value = "AI 助您快速收割所有人脈。";
      document.getElementById('section-loading').classList.add('hidden');
      document.getElementById('section-form').classList.remove('hidden');
    }, 1500);
  }

  window.switchView = (view) => {
    document.getElementById('view-list').classList.add('hidden');
    document.getElementById('view-process').classList.add('hidden');
    document.getElementById(`view-${view}`).classList.remove('hidden');
  };

  window.resetUI = () => window.switchView('list');

  window.copyInviteLink = () => {
    const shopId = localStorage.getItem('actsaas_shopId');
    const inviteUrl = `https://liff.line.me/${LIFF_ID}?invite=${shopId}`;
    const el = document.createElement('textarea');
    el.value = inviteUrl; document.body.appendChild(el);
    el.select(); document.execCommand('copy'); document.body.removeChild(el);
    alert("邀請連結已複製");
  };

  window.onload = startApp;
})();
</script>
</body>
</html>
