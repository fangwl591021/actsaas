<!DOCTYPE html>

<head>

  <style type="text/tailwindcss">
    @layer base {
      body { @apply font-['Noto_Sans_TC'] bg-slate-50 text-slate-900 antialiased; -webkit-tap-highlight-color: transparent; }
      * { @apply transition-all duration-200 border-none outline-none font-normal !important; }

    .input-label { @apply block text-[12px] font-bold text-slate-400 mb-2 uppercase tracking-[0.1em] pl-1; }
    .custom-input { @apply w-full h-[54px] px-4 bg-slate-100/50 rounded-2xl text-[15px] focus:bg-white focus:ring-4 focus:ring-blue-500/10 placeholder-slate-300; }
    .textarea-block { @apply w-full p-4 bg-slate-100/50 rounded-2xl text-[15px] resize-none leading-relaxed focus:bg-white focus:ring-4 focus:ring-blue-500/10; }
    .btn-primary { @apply w-full py-4 bg-blue-600 text-white rounded-[1.5rem] font-bold text-[16px] shadow-lg shadow-blue-500/20 active:scale-[0.97] flex items-center justify-center gap-2; }
    .btn-secondary { @apply w-full py-4 bg-white border border-slate-200 text-slate-700 rounded-[1.5rem] font-bold text-[16px] active:scale-[0.97] flex items-center justify-center gap-2; }

    .nav-active { @apply text-blue-600 font-bold; }
    .nav-active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
    .admin-nav-btn { @apply flex flex-col items-center justify-center transition-all flex-1 text-slate-500 h-full; }
    .admin-nav-active { @apply text-[#06C755] font-bold; }
    .admin-nav-active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1rem); }
    .card-shadow { box-shadow: 0 8px 30px -10px rgba(0,0,0,0.04); }
  </style>
</head>
<body class="flex flex-col items-center min-h-screen">

<div class="w-full max-w-md bg-white h-screen relative flex flex-col shadow-2xl overflow-hidden">
  
  <nav class="fixed top-0 w-full max-w-md z-40 bg-white/95 backdrop-blur-xl px-5 py-3.5 flex justify-between items-center left-1/2 -translate-x-1/2 border-b border-slate-50 shadow-sm">
    <div class="flex items-center gap-2.5">
      <div class="w-9 h-9 rounded-xl bg-blue-600 text-white flex items-center justify-center shadow-md">
        <span class="material-symbols-outlined text-[20px] icon-filled">contact_mail</span>
      </div>
      <div class="text-[18px] font-bold tracking-tight text-slate-800">名片管理 <span class="text-[9px] text-blue-600 bg-blue-50 px-1.5 py-0.5 rounded-md ml-1 font-black">v7.5.6</span></div>
    </div>
    <div class="flex items-center gap-3">

        <img id="user-avatar" src="" class="w-9 h-9 rounded-full object-cover border-2 border-white shadow-sm">

      <button id="role-switch-btn" onclick="window.toggleRoleMode()" class="hidden w-9 h-9 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center active:bg-slate-200">
        <span class="material-symbols-outlined text-[20px]">swap_horiz</span>
      </button>
    </div>
  </nav>

  <main id="main-content" class="flex-1 overflow-y-auto pb-32 pt-20 bg-slate-50">
    <div id="view-loading" class="h-full flex flex-col items-center justify-center space-y-4">
      <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
      <p id="loading-text" class="text-slate-400 font-bold text-[13px] tracking-widest">初始化中</p>
    </div>

    <div id="view-list" class="hidden animate-in fade-in duration-500">
      <div id="admin-tools-container" class="px-5 pt-4">
        <section class="bg-white rounded-[2.5rem] p-8 text-center border border-slate-50 card-shadow relative overflow-hidden">
          <div class="absolute top-0 right-0 w-24 h-24 bg-blue-50 rounded-bl-full opacity-40 -z-0"></div>
          <div class="relative z-10">
            <div class="w-14 h-14 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
              <span class="material-symbols-outlined text-[30px]">document_scanner</span>
            </div>
            <h2 class="text-[18px] font-bold text-slate-800 mb-1">AI 智慧名片辨識</h2>
            <p class="text-[13px] text-slate-400 mb-6 leading-relaxed">辨識名片、產出 AI 性格標籤。</p>
            <div class="flex gap-3">
              <button onclick="document.getElementById('card-camera').click()" class="btn-primary flex-[1.3]">開啟相機</button>
              <button onclick="document.getElementById('card-upload').click()" class="btn-secondary flex-1">相簿</button>
            </div>
            <button id="btn-batch-regenerate" onclick="window.batchRegenerateECards()" class="mt-4 text-[11px] text-slate-300 font-bold flex items-center justify-center mx-auto gap-1">
              <span class="material-symbols-outlined text-[15px]">sync</span> 批次同步名片
            </button>
            <input type="file" id="card-camera" accept="image/*" capture="environment" class="hidden" onchange="window.openCropper(this, 'card')">
            <input type="file" id="card-upload" accept="image/*" class="hidden" onchange="window.openCropper(this, 'card')">
          </div>
        </section>
      </div>

      <div id="admin-search-container" class="mt-6 px-5">
        <div class="flex gap-2 mb-4">
          <input type="text" id="card-search-input" onkeyup="window.filterCardList()" class="custom-input flex-1" placeholder="搜尋姓名或公司...">
          <button id="btn-refresh-cards" onclick="window.reloadCardContacts()" class="w-[54px] h-[54px] bg-white rounded-2xl flex items-center justify-center text-slate-400 border border-slate-50 shadow-sm"><span class="material-symbols-outlined">refresh</span></button>
        </div>
        <div id="admin-card-list-container" class="space-y-3"></div>
      </div>
    </div>

    <div id="view-process" class="hidden p-5 animate-in slide-in-from-right duration-300">
      <div id="section-loading" class="bg-white rounded-[2.5rem] p-10 text-center card-shadow">
        <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
        <h3 class="text-[17px] font-bold">AI 深度分析中...</h3>
      </div>
      <div id="section-form" class="hidden space-y-6">
        <div class="bg-white rounded-[2.5rem] p-6 card-shadow space-y-6">
          <img id="process-preview-image" src="" class="w-full aspect-video object-contain rounded-2xl bg-slate-50">
          <div class="grid grid-cols-2 gap-4">
            <input type="text" id="f-Name" class="custom-input" placeholder="姓名">
            <input type="text" id="f-EnglishName" class="custom-input" placeholder="英文名">
          </div>
          <input type="text" id="f-CompanyName" class="custom-input" placeholder="公司名稱">
          <input type="tel" id="f-Mobile" class="custom-input" placeholder="手機號碼">
          <textarea id="f-Slogan" class="textarea-block h-24" placeholder="AI 擴寫 Slogan"></textarea>
          <button id="btn-save" onclick="window.saveToCloud()" class="btn-primary">存入雲端資料庫</button>
        </div>
      </div>
    </div>
  </main>

  <!-- 底部導覽列 -->
  <nav id="bottom-nav-user" class="hidden fixed bottom-0 w-full max-w-md bg-white border-t border-slate-50 flex justify-around items-center px-1 py-2 z-40 pb-safe shadow-lg left-1/2 -translate-x-1/2 h-[76px] rounded-t-[2rem]">
    <button class="nav-btn nav-active"><span class="material-symbols-outlined">contact_mail</span><span class="text-[10px]">名片</span></button>
    <button onclick="window.location.href='index.html?view=user-profile'" class="nav-btn"><span class="material-symbols-outlined">person</span><span class="text-[10px]">設定</span></button>
  </nav>
  <nav id="bottom-nav-admin" class="hidden fixed bottom-0 w-full max-w-md bg-slate-900 border-t border-slate-800 flex justify-around items-center px-1 py-2 z-40 pb-safe shadow-lg left-1/2 -translate-x-1/2 h-[76px] rounded-t-[2rem]">
    <button class="admin-nav-btn admin-nav-active"><span class="material-symbols-outlined">recent_patient</span><span class="text-[10px]">名片</span></button>
    <button onclick="window.location.href='index.html?view=admin-crm'" class="admin-nav-btn"><span class="material-symbols-outlined">groups</span><span class="text-[10px]">CRM</span></button>
  </nav>
</div>

<!-- Modal 容器 -->
<div id="readonly-card-modal" class="hidden fixed inset-0 bg-white z-[100] flex flex-col">
  <div class="p-4 flex justify-end gap-3"><button onclick="window.closeReadOnlyCard()" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-500"><span class="material-symbols-outlined">close</span></button></div>
  <div class="flex-1 overflow-y-auto px-6"><h2 id="ro-name" class="text-3xl font-extrabold mb-2"></h2><p id="ro-title" class="text-slate-400 mb-6"></p><div id="ro-notes" class="bg-slate-50 p-5 rounded-2xl text-sm leading-relaxed"></div></div>
</div>

<!-- 裁切器容器 -->
<div id="section-image-cropper" class="hidden fixed inset-0 bg-black z-[1000] flex flex-col">
  <div class="p-4 flex justify-between text-white border-b border-slate-800"><button onclick="window.cancelCrop()" class="font-bold">取消</button><button onclick="window.confirmCrop()" class="bg-blue-600 px-4 py-1.5 rounded-lg">完成</button></div>
  <div class="flex-1 flex items-center justify-center"><img id="cropper-image" class="max-w-full opacity-0"></div>
</div>
<div id="toast" class="hidden"></div>

<!-- 腳本區：整合 v20260409_1300 邏輯 -->
<script>
(function() {
  const LIFF_ID = "2009367829-DLtYBDUm"; 
  const WORKER_URL = "https://actmaster.fangwl591021.workers.dev"; 
  const CACHE_KEY_CONTACTS = "app_cache_card_contacts_v1";
  
  let compressedBase64 = "";
  let userProfile = null;
  let cropperInstance = null;
  let globalCardContacts = []; 
  let filteredCards = [];
  let currentPage = 1;
  const PAGE_LIMIT = 10;
  let currentActiveCard = null; 
  let isProcessing = false;
  let isAdmin = false;

  window.showToast = function(msg, isError = false) {
    const t = document.getElementById('toast');
    if (!t) return;
    t.innerHTML = msg;
    t.className = `fixed top-14 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-white z-[9999] ${isError ? 'bg-red-500' : 'bg-slate-800'}`;
    t.classList.remove('hidden');
    setTimeout(() => t.classList.add('hidden'), 3000);
  };

  window.fetchAPI = async function(action, payload = {}) {
    try {
      const response = await fetch(WORKER_URL, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, payload })
      });
      const result = await response.json();
      if (!result.success) throw new Error(result.error);
      return result.data;
    } catch (err) { window.showToast(err.message, true); throw err; }
  };

  window.switchView = function(view) {
    ['view-loading', 'view-list', 'view-process'].forEach(v => document.getElementById(v)?.classList.add('hidden'));
    document.getElementById(`view-${view}`)?.classList.remove('hidden');
  };

  window.switchProcessSection = function(id) {
    ['section-loading', 'section-form'].forEach(v => document.getElementById(v)?.classList.add('hidden'));
    document.getElementById(id)?.classList.remove('hidden');
  };

  window.resetUI = function() { window.switchView('list'); compressedBase64 = ""; };

  window.loadCardContacts = async function() {
    try {
      const data = await window.fetchAPI('getCardContacts', { userId: userProfile.userId });
      globalCardContacts = data || [];
      window.filterCardList();
    } catch(e) {} finally { window.switchView('list'); }
  };

  window.filterCardList = function() {
    const term = document.getElementById('card-search-input')?.value.toLowerCase() || '';
    filteredCards = globalCardContacts.filter(c => (c['姓名'] || '').toLowerCase().includes(term) || (c['公司名稱'] || '').toLowerCase().includes(term));
    currentPage = 1;
    window.renderCardPage(true);
  };

  window.renderCardPage = function(isReset) {
    const container = document.getElementById('admin-card-list-container');
    if (isReset) container.innerHTML = "";
    const pageData = filteredCards.slice((currentPage - 1) * PAGE_LIMIT, currentPage * PAGE_LIMIT);
    container.innerHTML += pageData.map(c => `
      <div onclick="window.openCardDetailByRowId('${c.rowId}')" class="p-4 bg-white rounded-2xl shadow-sm flex items-center gap-4 border border-slate-50">
        <div class="w-12 h-12 bg-slate-50 rounded-full flex items-center justify-center"><span class="material-symbols-outlined text-slate-300">person</span></div>
        <div class="flex-1 font-bold text-slate-800">${c['姓名'] || '未知'}</div>
        <span class="text-[10px] bg-blue-50 text-blue-600 px-2 py-1 rounded-full font-bold">${c['公司名稱'] || ''}</span>
      </div>
    `).join('');
  };

  window.openCardDetailByRowId = function(rowId) {
    const card = globalCardContacts.find(c => String(c.rowId) === String(rowId));
    if(!card) return;
    document.getElementById('ro-name').innerText = card['姓名'] || '未知';
    document.getElementById('ro-title').innerText = card['職稱'] || '';
    document.getElementById('ro-notes').innerText = card['服務項目/品牌標語'] || '';
    document.getElementById('readonly-card-modal').classList.remove('hidden');
  };

  window.closeReadOnlyCard = function() { document.getElementById('readonly-card-modal').classList.add('hidden'); };

  window.openCropper = function(input, target) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = document.getElementById('cropper-image');
      img.src = e.target.result;
      document.getElementById('section-image-cropper').classList.remove('hidden');
      if (cropperInstance) cropperInstance.destroy();
      cropperInstance = new Cropper(img, { viewMode: 1, dragMode: 'move', autoCropArea: 0.9 });
      img.style.opacity = '1';
    };
    reader.readAsDataURL(input.files[0]);
  };

  window.cancelCrop = function() { document.getElementById('section-image-cropper').classList.add('hidden'); };

  window.confirmCrop = async function() {
    compressedBase64 = cropperInstance.getCroppedCanvas({ maxWidth: 800 }).toDataURL('image/jpeg', 0.8);
    window.cancelCrop();
    document.getElementById('process-preview-image').src = compressedBase64;
    window.switchView('process');
    window.switchProcessSection('section-loading');
    
    try {
      const data = await window.fetchAPI('recognizeCard', { base64Image: compressedBase64.split(',')[1] });
      ['Name', 'EnglishName', 'CompanyName', 'Mobile', 'Slogan'].forEach(f => {
        document.getElementById(`f-${f}`).value = data[f] || '';
      });
      window.switchProcessSection('section-form');
    } catch(e) { window.resetUI(); }
  };

  window.saveToCloud = async function() {
    const payload = { userId: userProfile.userId, Name: document.getElementById('f-Name').value, CompanyName: document.getElementById('f-CompanyName').value };
    await window.fetchAPI('saveCard', payload);
    window.showToast("🎉 儲存成功");
    window.resetUI();
    window.loadCardContacts();
  };

  async function startApp() {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    userProfile = await liff.getProfile();
    isAdmin = ["Uf729764dbb5b652a5a90a467320bea29", "U58eb5c1a747450140ce1335af709ae55"].includes(userProfile.userId);
    
    document.getElementById('user-avatar').src = userProfile.pictureUrl;
    document.getElementById('user-profile-badge').classList.remove('hidden');
    if (isAdmin) {
      document.getElementById('bottom-nav-admin').classList.remove('hidden');
      document.getElementById('role-switch-btn').classList.remove('hidden');
    } else {
      document.getElementById('bottom-nav-user').classList.remove('hidden');
    }
    window.loadCardContacts();
  }

  window.onload = startApp;
})();
</script>
</body>
</html>
