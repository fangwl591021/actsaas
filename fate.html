<!-- Version: v1.5.0 (名片收割機：AI 商業智能配對 - LINE OA 原生資訊流優化) -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>AI 商業配對</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style type="text/tailwindcss">
    @layer base {
      body { @apply font-['Noto_Sans_TC'] bg-white text-gray-800 antialiased font-normal; -webkit-tap-highlight-color: transparent; }
      * { @apply font-normal !important; border-radius: 0 !important; }
    }
    .input-label { @apply block text-[11px] text-gray-400 mb-1 uppercase tracking-widest; }
    .textarea-block { @apply w-full p-3 bg-gray-50 border-none outline-none text-[14px] text-gray-800 resize-none leading-relaxed placeholder-gray-300; }
    .btn-primary { @apply w-full py-4 bg-blue-600 text-white text-[16px] active:opacity-80 transition-all flex items-center justify-center gap-2; }
    .nav-btn { @apply flex flex-col items-center justify-center transition-all flex-1 text-gray-400 h-full; min-width: 48px; }
    .nav-active { @apply text-blue-600; }
    .nav-active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
    .match-row { @apply px-4 py-5 border-b border-gray-50 flex flex-col gap-3 active:bg-gray-50 transition-colors; }
  </style>
</head>
<body class="w-full min-h-screen bg-white">

  <nav class="sticky top-0 w-full z-40 bg-white px-4 py-3.5 flex justify-between items-center border-b border-gray-100">
    <div class="text-[16px] text-gray-800 flex items-center gap-2 tracking-tight">
      <span class="material-symbols-outlined text-[22px] text-blue-600">psychology</span>
      AI 合作配對池
    </div>
    <img id="user-avatar" src="" class="w-8 h-8 rounded-full">
  </nav>

  <main class="flex-1 pb-32">
    <div id="view-loading" class="py-24 flex flex-col items-center justify-center space-y-4">
      <div class="w-6 h-6 border-2 border-gray-200 border-t-blue-500 animate-spin" style="border-radius:50%!important"></div>
      <p class="text-gray-300 text-[12px]">載入大廳中...</p>
    </div>

    <div id="view-main" class="hidden">
      <div id="privacy-lock-container" class="hidden px-8 py-20 text-center flex flex-col items-center">
        <span class="material-symbols-outlined text-gray-200 text-6xl mb-4">lock_person</span>
        <h2 class="text-[18px]">隱私模式已開啟</h2>
        <p class="text-[13px] text-gray-400 leading-relaxed mb-10">為了互惠公平，請先將名片開放至配對池。</p>
        <button onclick="toggleFatePrivacy(true)" class="btn-primary w-full">立即公開並解鎖</button>
      </div>

      <div id="matchmaker-ui" class="hidden">
        <div class="px-4 py-6 border-b border-gray-100 bg-gray-50/30">
          <div class="flex justify-between items-center mb-6">
            <div class="text-[14px] flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-green-500"></span> 參與配對中</div>
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" id="fate-privacy-toggle" class="sr-only peer" checked onchange="toggleFatePrivacy()">
              <div class="w-10 h-5 bg-gray-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600"></div>
            </label>
          </div>
          <label class="input-label">請輸入您的業務合作需求</label>
          <textarea id="search-query" class="textarea-block h-32 mb-4 bg-white" placeholder="例如：我想找有電商通路資源的夥伴..."></textarea>
          <button id="btn-match" onclick="startMatchmaking()" class="btn-primary">啟動 AI 深度媒合</button>
        </div>
        <div id="results-container" class="flex flex-col"></div>
      </div>
    </div>
  </main>

  <nav class="fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around py-2 h-16 items-center z-40">
    <div onclick="window.location.href='card.html'" class="nav-btn text-gray-300"><span class="material-symbols-outlined text-[20px]">contact_page</span><span class="text-[10px] mt-1">名片</span></div>
    <div class="nav-btn nav-active"><span class="material-symbols-outlined text-[20px]">psychology</span><span class="text-[10px] mt-1">配對</span></div>
    <div onclick="window.location.href='index.html'" class="nav-btn text-gray-300"><span class="material-symbols-outlined text-[20px]">person</span><span class="text-[10px] mt-1">設定</span></div>
  </nav>

<script>
(function() {
  const LIFF_ID = "2008786875-DfKEEqkA", WORKER_URL = "https://actsaas.fangwl591021.workers.dev";
  let userProfile = null, globalCardContacts = [];

  async function startApp() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      userProfile = await liff.getProfile();
      document.getElementById('user-avatar').src = userProfile.pictureUrl;
      const res = await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'getCardContacts', payload: { userId: userProfile.userId } }) });
      const data = await res.json(); globalCardContacts = data.success ? data.data : [];
      const myCard = globalCardContacts.find(c => c.id.startsWith(userProfile.userId));
      let isPrivate = false; try { if(myCard && myCard.config) isPrivate = JSON.parse(myCard.config).isPrivate === true; } catch(e){}
      document.getElementById('fate-privacy-toggle').checked = !isPrivate;
      if (isPrivate) { document.getElementById('privacy-lock-container').classList.remove('hidden'); }
      else { document.getElementById('matchmaker-ui').classList.remove('hidden'); }
      document.getElementById('view-loading').classList.add('hidden'); document.getElementById('view-main').classList.remove('hidden');
    } catch (e) { console.error(e); }
  }

  window.toggleFatePrivacy = async (forcePublic = null) => {
    const isPublic = forcePublic !== null ? forcePublic : document.getElementById('fate-privacy-toggle').checked;
    await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'saveCard', payload: { userId: userProfile.userId, Config: JSON.stringify({ isPrivate: !isPublic }) } }) });
    location.reload();
  };

  window.startMatchmaking = async () => {
    const query = document.getElementById('search-query').value.trim();
    if (!query) return;
    const btn = document.getElementById('btn-match'); btn.disabled = true; btn.innerHTML = 'AI 深度媒合中...';
    const pool = globalCardContacts.map(c => ({ name: c.name, company: c.company, personality: c.tag, rowId: c.id }));
    const res = await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'matchmakeContacts', payload: { userId: userProfile.userId, query, pool } }) });
    const result = await res.json();
    const container = document.getElementById('results-container');
    if (result.success && result.data.length > 0) {
      container.innerHTML = result.data.map(m => `<div class="match-row"><div class="flex justify-between"><div><div class="text-[16px]">${m.name}</div><div class="text-[11px] text-gray-400">${m.company}</div></div><div class="text-[12px] text-blue-600 bg-blue-50 px-2 py-0.5">${m.score}% 契合</div></div><div class="text-[13px] text-gray-500 italic bg-gray-50 p-3">"${m.reason}"</div></div>`).join('');
    } else { container.innerHTML = '<div class="py-20 text-center text-gray-300 text-[13px]">無匹配夥伴</div>'; }
    btn.disabled = false; btn.innerHTML = '啟動 AI 深度媒合';
  };
  window.onload = startApp;
})();
</script>
</body>
</html>
