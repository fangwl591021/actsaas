<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>SaaS 系統總管</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style type="text/tailwindcss">
    @layer base {
      body { @apply font-['Noto_Sans_TC'] bg-slate-50 text-slate-900 antialiased; -webkit-tap-highlight-color: transparent; }
      * { @apply transition-all duration-200 border-none outline-none font-normal !important; }
    }
    .tenant-card { @apply bg-white p-5 rounded-3xl mb-4 border border-slate-100 shadow-sm flex flex-col gap-2; }
  </style>
</head>
<body class="flex flex-col items-center min-h-screen pb-10">

<div class="w-full max-w-md bg-white min-h-screen relative flex flex-col shadow-2xl overflow-hidden bg-slate-50">
  
  <!-- 導覽列 -->
  <nav class="sticky top-0 w-full max-w-md z-40 bg-slate-900 px-5 py-3.5 flex justify-between items-center shadow-md">
    <div class="flex items-center gap-2.5">
      <div class="w-9 h-9 rounded-xl bg-blue-500 text-white flex items-center justify-center">
        <span class="material-symbols-outlined text-[20px] icon-filled">admin_panel_settings</span>
      </div>
      <div class="text-[18px] font-bold tracking-tight text-white">SaaS 系統總管</div>
    </div>
    <div class="flex items-center gap-3">
      <!-- 切換回店長模式按鈕 -->
      <button onclick="window.location.href='card.html'" class="w-9 h-9 rounded-full bg-slate-800 text-slate-300 flex items-center justify-center active:bg-slate-700">
        <span class="material-symbols-outlined text-[20px]">swap_horiz</span>
      </button>
    </div>
  </nav>

  <main class="flex-1 px-5 pt-6">
    <!-- 數據概覽 -->
    <div class="grid grid-cols-2 gap-4 mb-6">
      <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
        <div class="text-slate-400 text-[12px] mb-1">總店鋪數</div>
        <div class="text-3xl font-bold text-slate-800" id="total-tenants">-</div>
      </div>
      <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
        <div class="text-slate-400 text-[12px] mb-1">系統狀態</div>
        <div class="text-[16px] font-bold text-[#06C755] mt-1 flex items-center gap-1">
          <span class="material-symbols-outlined text-[18px]">check_circle</span> 運行中
        </div>
      </div>
    </div>

    <!-- 租戶列表 -->
    <h2 class="text-[14px] font-bold text-slate-500 mb-3 ml-1">已註冊團隊 (Tenants)</h2>
    <div id="loading" class="text-center py-10">
      <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
      <div class="text-[13px] text-slate-400">載入租戶資料...</div>
    </div>
    
    <div id="tenant-list" class="space-y-3"></div>
  </main>
</div>

<script>
  const LIFF_ID = "2008786875-DfKEEqkA"; 
  const WORKER_URL = "https://actsaas.fangwl591021.workers.dev"; 
  const SUPER_ADMIN = "U94a7052d5af5e4f6b4efea79bfe26003";

  async function init() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      
      const profile = await liff.getProfile();
      if (profile.userId !== SUPER_ADMIN) {
        alert("權限不足：您不是系統管理員");
        window.location.replace('card.html');
        return;
      }
      
      loadTenants(profile.userId);
    } catch (e) {
      alert("LIFF 初始化異常");
    }
  }

  async function loadTenants(uid) {
    try {
      const response = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'getSystemTenants', payload: { userId: uid } })
      });
      const result = await response.json();
      
      document.getElementById('loading').classList.add('hidden');
      
      if (result.success) {
        document.getElementById('total-tenants').innerText = result.data.length;
        renderTenants(result.data);
      } else {
        alert("讀取失敗：" + result.error);
      }
    } catch (e) {
      alert("連線異常");
    }
  }

  function renderTenants(tenants) {
    const container = document.getElementById('tenant-list');
    if (tenants.length === 0) {
      container.innerHTML = '<div class="text-center py-10 text-slate-400">尚無租戶資料</div>';
      return;
    }
    
    container.innerHTML = tenants.map(t => `
      <div class="tenant-card">
        <div class="flex justify-between items-start">
          <div class="font-bold text-[16px] text-slate-800">${t.name}</div>
          <span class="text-[10px] bg-blue-50 text-blue-600 px-2 py-1 rounded-md font-bold">${t.version}</span>
        </div>
        <div class="text-[12px] text-slate-400 font-mono mt-1">${t.shopId}</div>
        <div class="flex justify-between items-center mt-3 pt-3 border-t border-slate-50">
           <div class="text-[11px] text-slate-400 flex items-center gap-1">
             <span class="material-symbols-outlined text-[14px] text-[#06C755]">check_circle</span> ${t.status}
           </div>
           <a href="https://docs.google.com/spreadsheets/d/${t.sheetId}" target="_blank" class="text-[11px] text-blue-500 flex items-center gap-1 active:scale-95">
             <span class="material-symbols-outlined text-[14px]">open_in_new</span> 開啟資料庫
           </a>
        </div>
      </div>
    `).join('');
  }

  window.onload = init;
</script>
</body>
</html>
