<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>SaaS 系統總管</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style type="text/tailwindcss">
    @layer base {
      body { 
        @apply font-['Noto_Sans_TC'] bg-white text-gray-800 antialiased font-normal; 
        -webkit-tap-highlight-color: transparent; 
      }
      * { 
        @apply font-normal !important; /* 強制移除所有加粗字 */
        border-radius: 0 !important;   /* 移除多餘圓角，回歸原生資訊流 */
      }
    }
  </style>
</head>
<body class="w-full min-h-screen relative flex flex-col">
  
  <!-- 極簡頂部導覽列 -->
  <nav class="sticky top-0 w-full z-40 bg-white px-4 py-3 flex justify-between items-center border-b border-gray-200">
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined text-[20px] text-gray-600">admin_panel_settings</span>
      <div class="text-[16px] text-gray-800 tracking-wide">SaaS 系統總管</div>
    </div>
    <!-- 切換回店長模式按鈕 -->
    <button onclick="window.location.href='card.html'" class="text-gray-500 flex items-center justify-center p-1 active:bg-gray-50">
      <span class="material-symbols-outlined text-[22px]">swap_horiz</span>
    </button>
  </nav>

  <main class="flex-1">
    <!-- 數據概覽 (無框線，純文字資訊流) -->
    <div class="px-4 py-3 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
      <div class="text-[13px] text-gray-500">總店鋪數: <span id="total-tenants" class="text-gray-800 text-[15px] ml-1">-</span></div>
      <div class="text-[12px] text-[#06C755] flex items-center gap-1">
        <span class="material-symbols-outlined text-[14px]">radio_button_checked</span> 系統運行中
      </div>
    </div>

    <!-- 租戶列表 -->
    <div id="loading" class="text-center py-10">
      <div class="w-6 h-6 border-2 border-gray-300 border-t-gray-600 rounded-full animate-spin mx-auto mb-2" style="border-radius: 50% !important;"></div>
      <div class="text-[13px] text-gray-400">讀取中...</div>
    </div>
    
    <div id="tenant-list" class="flex flex-col"></div>
  </main>

<script>
  const LIFF_ID = "2008786875-DfKEEqkA"; 
  const WORKER_URL = "https://actsaas.fangwl591021.workers.dev"; 
  const SUPER_ADMIN = "U94a7052d5af5e4f6b4efea79bfe26003";

  async function init() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      
      const profile = await liff.getProfile();
      if (profile.userId !== SUPER_ADMIN) {
        alert("權限不足：您不是系統管理員");
        window.location.replace('card.html');
        return;
      }
      
      loadTenants(profile.userId);
    } catch (e) {
      alert("LIFF 初始化異常");
    }
  }

  async function loadTenants(uid) {
    try {
      const response = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'getSystemTenants', payload: { userId: uid } })
      });
      const result = await response.json();
      
      document.getElementById('loading').classList.add('hidden');
      
      if (result.success) {
        document.getElementById('total-tenants').innerText = result.data.length;
        renderTenants(result.data);
      } else {
        alert("讀取失敗：" + result.error);
      }
    } catch (e) {
      alert("連線異常");
    }
  }

  function renderTenants(tenants) {
    const container = document.getElementById('tenant-list');
    if (tenants.length === 0) {
      container.innerHTML = '<div class="text-center py-10 text-gray-400 text-[14px]">尚無租戶資料</div>';
      return;
    }
    
    // 渲染原生資訊流列表 (無包框、底部格線、無加粗)
    container.innerHTML = tenants.map(t => {
      const statusColor = t.status === 'Active' ? 'text-[#06C755]' : 'text-gray-400';
      return `
      <div class="px-4 py-3 border-b border-gray-100 flex flex-col gap-1.5 active:bg-gray-50 transition-colors">
        <div class="flex justify-between items-center">
          <div class="text-[15px] text-gray-800 tracking-wide">${t.name}</div>
          <div class="text-[11px] text-gray-400 border border-gray-200 px-1.5 py-0.5">${t.version}</div>
        </div>
        <div class="text-[12px] text-gray-400 font-mono">${t.shopId}</div>
        <div class="flex justify-between items-center mt-1">
           <div class="text-[12px] ${statusColor} flex items-center gap-1">
             ${t.status}
           </div>
           <a href="https://docs.google.com/spreadsheets/d/${t.sheetId}" target="_blank" class="text-[13px] text-blue-500 flex items-center gap-0.5">
             開啟資料庫 <span class="material-symbols-outlined text-[14px]">chevron_right</span>
           </a>
        </div>
      </div>
    `}).join('');
  }

  window.onload = init;
</script>
</body>
</html>
