<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>加入團隊</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style type="text/tailwindcss">
    @layer base { body { @apply font-['Noto_Sans_TC'] bg-slate-50 antialiased; } }
    .btn-primary { @apply w-full py-4 bg-[#06C755] text-white rounded-2xl font-bold text-[16px] shadow-lg active:scale-[0.98]; }
  </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-8">

<div class="w-full max-w-md bg-white p-8 rounded-[2rem] shadow-xl text-center">
  <div class="w-16 h-16 bg-[#06C755] text-white rounded-[1.5rem] flex items-center justify-center mx-auto mb-6">
    <span class="material-symbols-outlined text-[32px]">handshake</span>
  </div>
  <h1 class="text-[22px] font-bold text-slate-800">邀請您加入團隊</h1>
  <p class="text-[14px] text-slate-500 mt-2 mb-8">加入後，您的名片資料將同步至團隊專屬雲端空間。</p>
  
  <button id="join-btn" onclick="joinTeam()" class="btn-primary">確認綁定並進入系統</button>
</div>

<script>
  const WORKER_URL = "https://actsaas.fangwl591021.workers.dev"; 
  let userId = null;
  let targetShopId = null;

  async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    targetShopId = urlParams.get('shopId');
    
    await liff.init({ liffId: "2008786875-DfKEEqkA" });
    const profile = await liff.getProfile();
    userId = profile.userId;
  }

  async function joinTeam() {
    if (!targetShopId || !userId) return alert("邀請碼無效或系統異常");

    const btn = document.getElementById('join-btn');
    btn.innerText = "正在綁定身分...";
    btn.disabled = true;

    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'joinTenant',
          payload: { userId: userId, shopId: targetShopId }
        })
      });
      const data = await res.json();
      
      if (data.success) {
        alert("🎉 加入成功！即將進入系統");
        window.location.replace('card.html');
      } else {
        throw new Error(data.error);
      }
    } catch (e) {
      alert("綁定失敗: " + e.message);
      btn.innerText = "確認綁定並進入系統";
      btn.disabled = false;
    }
  }
  
  window.onload = init;
</script>
</body>
</html>
