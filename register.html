<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>ACTMASTER 合作夥伴註冊</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style type="text/tailwindcss">
    @layer base {
      body { @apply font-['Noto_Sans_TC'] bg-slate-50 text-slate-900 antialiased; -webkit-tap-highlight-color: transparent; }
      * { @apply transition-all duration-200 border-none outline-none font-normal !important; }
    }
    .custom-input { @apply w-full h-[54px] px-4 bg-white border border-slate-100 rounded-2xl text-[15px] focus:ring-4 focus:ring-blue-500/10 shadow-sm; }
    .btn-primary { @apply w-full py-4 bg-blue-600 text-white rounded-2xl font-bold text-[16px] shadow-lg active:scale-[0.98] flex items-center justify-center gap-2; }
  </style>
</head>
<body class="flex flex-col items-center min-h-screen">

<div class="w-full max-w-md bg-white min-h-screen relative flex flex-col shadow-2xl overflow-hidden p-8">
  
  <header class="text-center mt-10 mb-10">
    <div class="w-16 h-16 bg-blue-600 text-white rounded-[1.5rem] flex items-center justify-center mx-auto mb-6 shadow-xl">
      <span class="material-symbols-outlined text-[32px]">rocket_launch</span>
    </div>
    <h1 class="text-[24px] font-bold text-slate-800">SaaS 空間初始化</h1>
    <p class="text-[14px] text-slate-400 mt-2">填寫資訊以展開您的雲端資料夾</p>
  </header>

  <div id="reg-form" class="space-y-6">
    <input type="text" id="t-name" class="custom-input" placeholder="商店/團隊名稱 (例如: 康力團隊)">
    <input type="text" id="l-name" class="custom-input" placeholder="負責人姓名">
    <button id="submit-btn" onclick="submitReg()" class="btn-primary">啟動雲端自動建置</button>
  </div>

  <div id="reg-success" class="hidden text-center py-10 animate-in fade-in zoom-in">
    <span class="material-symbols-outlined text-green-500 text-6xl">check_circle</span>
    <h2 class="text-xl font-bold mt-4">初始化成功</h2>
    <p class="text-sm text-slate-500 mt-2">資料夾與試算表欄位已自動展開。</p>
    <button onclick="liff.closeWindow()" class="mt-8 text-blue-600 font-bold">返回對話</button>
  </div>

</div>

<script>
  const WORKER_URL = "https://actmaster.fangwl591021.workers.dev"; 
  let userId = null;

  async function init() {
    await liff.init({ liffId: "2008786875-DfKEEqkA" });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile = await liff.getProfile();
    userId = profile.userId;
  }

  async function submitReg() {
    const btn = document.getElementById('submit-btn');
    const tName = document.getElementById('t-name').value;
    const lName = document.getElementById('l-name').value;

    if (!tName || !lName) { alert("請填寫完整資訊"); return; }

    btn.innerText = "正在展開雲端空間...";
    btn.disabled = true;

    try {
      const response = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'onboardTenant',
          payload: { userId, tenantName: tName, leaderName: lName }
        })
      });
      const result = await response.json();
      if (result.success) {
        document.getElementById('reg-form').classList.add('hidden');
        document.getElementById('reg-success').classList.remove('hidden');
      } else {
        alert("註冊失敗: " + result.error);
        btn.innerText = "啟動雲端自動建置";
        btn.disabled = false;
      }
    } catch (e) {
      alert("連線失敗，請確認 Worker URL");
      btn.disabled = false;
    }
  }
  window.onload = init;
</script>
</body>
</html>
